version: "3"

# Environment selection: ENV=dev (default) or ENV=prod — selects Doppler config name only.
# Local secrets: doppler run --project canopy --config <ENV> (see test:e2e, taskfiles/e2e-setup.md).

vars:
  # Default to dev environment
  ENV: '{{.ENV | default "dev"}}'
  CANOPY_ID: '{{.CANOPY_ID | default "canopy-dev-1"}}'
  FOREST_PROJECT_ID: '{{.FOREST_PROJECT_ID | default "forest-dev-5"}}'
  CLOUDFLARE_ACCOUNT_ID: "{{.CLOUDFLARE_ACCOUNT_ID}}"
  # Public Custodian base (no path suffix); defaults to dev DNS. Override for prod.
  CUSTODIAN_BASE_URL: '{{.CUSTODIAN_BASE_URL | default "https://custodian.a.forest-2.forestrie.dev"}}'

includes:
  scrapi:
    taskfile: ./taskfiles/scrapi.yml
  scout:
    taskfile: ./taskfiles/scout.yml
    vars:
      BASE_URL: "{{.SCOUT_BASE_URL}}"
  custodian:
    taskfile: ./taskfiles/custodian.yml
    vars:
      BASE_URL: "{{.CUSTODIAN_BASE_URL}}"
  x402: ./taskfiles/x402.yml
  cf: ./taskfiles/cloudflare.yml
  deploy: ./taskfiles/deploy.yml
  minio: ./taskfiles/minio.yml
  wrangler: ./taskfiles/wrangler.yml
  merklelog: ./taskfiles/merklelog.yml
  perf: ./taskfiles/perf.yml
  grant-shared: ./taskfiles/grant-shared.yml
  grant-bootstrap: ./taskfiles/grant-bootstrap.yml
  grant: ./taskfiles/grant.yml
  e2e-shared: ./taskfiles/e2e-shared.yml
  e2e-univocity: ./taskfiles/e2e-univocity.yml
  univocity-tools: ./taskfiles/univocity-tools.yml

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  test:
    desc: run all the current tests
    cmds:
      - pnpm -r test

  test:e2e:
    desc: |
      Full dev Playwright e2e (integration → system → custodian → coordinator when configured).
      Requires Doppler project **canopy**, config **ENV** (default **dev**; use ENV=prod for prod).
      Recommended: doppler run --project canopy --config dev -- task test:e2e
      Self-wraps with doppler run when DOPPLER_CONFIG is unset. Runs preflight first.
      CI runs Playwright without Doppler — see .github/workflows/tests-system.yml.
      Do not add doppler run to @canopy/api-e2e package.json scripts.
    deps: [test:e2e:preflight]
    cmds:
      - task: e2e-shared:ensure-doppler
        vars:
          E2E_DOPPLER_TASK: test:e2e
      - task: e2e-shared:run-full

  test:e2e:preflight:
    desc: |
      E2e prerequisites: bootstrap, Doppler validation, Univocity provision (default).
      Opt out of on-chain provision: SKIP_UNIVOCITY_PROVISION=true or
      E2E_SKIP_UNIVOCITY_PROVISION=true
      Recommended: doppler run --project canopy --config dev -- task test:e2e:preflight
      Use ENV=prod when the Doppler config should be **prod**.
    cmds:
      - task: e2e-shared:bootstrap
      - task: e2e-shared:ensure-doppler
        vars:
          E2E_DOPPLER_TASK: test:e2e:preflight
      - task: e2e-shared:provision-univocity
      - task: e2e-shared:validate-env
      - task: e2e-shared:validate-univocity-deploy

  build:
    desc: build everything
    cmds:
      - pnpm -r build

  check:md:
    desc: "Validate Mermaid diagram syntax in a markdown file (task check:md -- path/to/file.md)"
    cmds:
      - node scripts/validate-mermaid.mjs {{.CLI_ARGS}}

  install:dev:
    desc: |
      Install univocity-tools deployer + contract-artefacts for local dev
      (.cache/univocity-tools). Builds native binaries from sibling checkout.
    cmds:
      - task: univocity-tools:install

  install:release:
    desc: |
      Download univocity-tools linux-x64 release binaries into
      .cache/univocity-tools (CI parity; no sibling checkout).
    cmds:
      - task: univocity-tools:install:release

  tools:check:
    desc: Check for required tools (Node, pnpm, Wrangler)
    cmds:
      - |
        MISSING_TOOLS=""

        # Check Node.js
        if ! command -v node &> /dev/null; then
          MISSING_TOOLS="${MISSING_TOOLS}  Node.js: Install from https://nodejs.org/\n"
        fi

        # Check pnpm
        if ! command -v pnpm &> /dev/null; then
          MISSING_TOOLS="${MISSING_TOOLS}  pnpm: Install with 'npm install -g pnpm' or from https://pnpm.io/\n"
        fi

        # Check Wrangler (Cloudflare CLI)
        if ! command -v wrangler &> /dev/null; then
          MISSING_TOOLS="${MISSING_TOOLS}  Wrangler: Install with 'pnpm add -g wrangler'\n"
        fi

        # Check Playwright (for e2e tests)
        if ! npx playwright --version &> /dev/null 2>&1; then
          MISSING_TOOLS="${MISSING_TOOLS}  Playwright: Will be installed with 'pnpm install'\n"
        fi

        if [ -n "$MISSING_TOOLS" ]; then
          echo "Missing tools detected:"
          echo -e "$MISSING_TOOLS"
          echo "Please install the missing tools before proceeding."
          exit 1
        fi
