---
# Bootstrap: mint bootstrap grant, register, poll until sequenced, resolve receipt (Plan 0010).
# No server-side storage; workflow saves grant to GRANT_DATA_DIR.

version: "3"

vars:
  ROOT_DIR: "{{.ROOT_DIR | default .}}"
  GRANT_DATA_DIR: '{{.GRANT_DATA_DIR | default "perf/data"}}'
  CANOPY_BASE_URL: "{{.CANOPY_BASE_URL}}"
  SCRAPI_API_KEY: "{{.SCRAPI_API_KEY}}"
  ROOT_LOG_ID: '{{.ROOT_LOG_ID}}'
  POLL_MAX: '{{.POLL_MAX | default "120"}}'
  POLL_INTERVAL_MS: '{{.POLL_INTERVAL_MS | default "500"}}'

tasks:
  mint:
    desc: "POST /api/grants/bootstrap, save response body to GRANT_DATA_DIR/bootstrap-grant.b64"
    cmds:
      - |
        mkdir -p "{{.GRANT_DATA_DIR}}"
        BODY='{}'
        [ -n "{{.ROOT_LOG_ID}}" ] && BODY='{"rootLogId":"{{.ROOT_LOG_ID}}"}'
        curl -sS -X POST "{{.CANOPY_BASE_URL}}/api/grants/bootstrap" \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer {{.SCRAPI_API_KEY}}" \
          -d "$BODY" \
          -o "{{.GRANT_DATA_DIR}}/bootstrap-grant.b64"
        if [ ! -s "{{.GRANT_DATA_DIR}}/bootstrap-grant.b64" ]; then
          echo "Bootstrap mint failed (empty or missing response)" >&2
          exit 1
        fi
        echo "Saved bootstrap grant to {{.GRANT_DATA_DIR}}/bootstrap-grant.b64"

  register:
    desc: "POST register-grant with Forestrie-Grant from bootstrap file; save status URL"
    deps: [mint]
    cmds:
      - |
        GRANT_B64=$(cat "{{.GRANT_DATA_DIR}}/bootstrap-grant.b64")
        LOCATION=$(curl -sS -D - -X POST "{{.CANOPY_BASE_URL}}/register/grants" \
          -H "Authorization: Forestrie-Grant $GRANT_B64" \
          -o /dev/null 2>&1 | grep -i "^Location:" | sed 's/Location: *//' | tr -d '\r\n')
        if [ -z "$LOCATION" ]; then
          echo "register-grant did not return 303 Location" >&2
          exit 1
        fi
        echo "$LOCATION" > "{{.GRANT_DATA_DIR}}/status-url.txt"
        echo "Status URL: $LOCATION"

  poll:
    desc: "Poll status URL until 303 to receipt; save receipt URL"
    deps: [register]
    env:
      CANOPY_BASE_URL: "{{.CANOPY_BASE_URL}}"
      SCRAPI_API_KEY: "{{.SCRAPI_API_KEY}}"
    cmds:
      - |
        STATUS_URL=$(cat "{{.GRANT_DATA_DIR}}/status-url.txt")
        RECEIPT_URL=$(pnpm --filter @canopy/perf run poll-status -- "$STATUS_URL" "{{.POLL_MAX}}" "{{.POLL_INTERVAL_MS}}")
        echo "$RECEIPT_URL" > "{{.GRANT_DATA_DIR}}/receipt-url.txt"
        echo "Receipt URL: $RECEIPT_URL"

  resolve:
    desc: "GET receipt, build completed grant, save to completed-root-grant.b64"
    deps: [poll]
    env:
      SCRAPI_API_KEY: "{{.SCRAPI_API_KEY}}"
    cmds:
      - |
        RECEIPT_URL=$(cat "{{.GRANT_DATA_DIR}}/receipt-url.txt")
        pnpm --filter @canopy/perf run resolve-receipt-to-grant -- "$RECEIPT_URL" "{{.GRANT_DATA_DIR}}/bootstrap-grant.b64" "{{.GRANT_DATA_DIR}}/completed-root-grant.b64"
        echo "Saved completed grant to {{.GRANT_DATA_DIR}}/completed-root-grant.b64"

  bootstrap:
    desc: "Full bootstrap mint register poll resolve (requires ROOT_LOG_ID, CANOPY_BASE_URL, SCRAPI_API_KEY)"
    deps: [resolve]
    cmds:
      - |
        echo "Bootstrap complete. Completed grant at {{.GRANT_DATA_DIR}}/completed-root-grant.b64"
