---
# Shared tasks for Playwright e2e (@canopy/api-e2e). Included from Taskfile.dist.yml as e2e-shared.
# Setup and env: see taskfiles/e2e-setup.md
#
# Run tasks from the repository root (same directory as Taskfile.dist.yml).
# Preflight uses sed/awk (no nested ${var#"${var%%[![:space:]]}"} — mvdan/sh panics on that).

version: "3"

vars:
  ENV: '{{.ENV | default "dev"}}'
  E2E_UNIVOCITY_ENV_FILE: "{{.ROOT_DIR}}/.work/e2e-univocity.env"
  PROPOSAL_DIR: "{{.ROOT_DIR}}/.work/univocity-e2e/proposals"

tasks:
  bootstrap:
    desc: Bootstrap tasks typically only needed in a fresh clone, which includes CI builds
    cmds:
      - pnpm install
      - pnpm --filter @canopy/api-e2e exec playwright --version
      - pnpm --filter @canopy/api-e2e exec playwright install chromium

  ensure-doppler:
    desc: |
      Re-exec the caller task under doppler run when Doppler env is not already injected.
      Pass E2E_DOPPLER_TASK (e.g. test:e2e or test:e2e:preflight).
    requires:
      vars: [E2E_DOPPLER_TASK]
    preconditions:
      - sh: command -v doppler >/dev/null 2>&1
        msg: "doppler CLI is required — install from https://docs.doppler.com/docs/install-cli"
    cmds:
      - |
        set -euo pipefail
        if [ -n "${DOPPLER_CONFIG:-}" ] || [ -n "${DOPPLER_PROJECT:-}" ]; then
          exit 0
        fi
        exec doppler run --project canopy --config {{.ENV}} -- \
          task "{{.E2E_DOPPLER_TASK}}"

  validate-env:
    desc: |
      Fail fast when required e2e secrets/vars are missing (mirrors tests-system.yml).
      Set VALIDATE_SKIP_UNIVOCITY=1 to skip Univocity address checks (fresh provision path).
      Set VALIDATE_REQUIRE_COORDINATOR=1 to require coordinator env (full system BYOK suite).
    cmds:
      - |
        set -euo pipefail
        trim_ws() { printf '%s' "$1" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }

        if [ -z "$(trim_ws "${SCRAPI_API_KEY:-}")" ]; then
          echo "SCRAPI_API_KEY is not set in Doppler (project canopy, config {{.ENV}})." >&2
          exit 1
        fi

        BASE="$(trim_ws "${CANOPY_BASE_URL:-}")"
        if [ -n "$BASE" ]; then
          export CANOPY_BASE_URL="${BASE%/}"
        else
          FQ="$(trim_ws "${CANOPY_FQDN:-}")"
          FQ="${FQ#https://}"
          FQ="${FQ#http://}"
          FQ="${FQ%%/*}"
          FQ="${FQ%/}"
          if [ -z "$FQ" ]; then
            echo "Set CANOPY_BASE_URL or CANOPY_FQDN in Doppler (project canopy, config {{.ENV}})." >&2
            exit 1
          fi
          export CANOPY_BASE_URL="https://${FQ}"
          export CANOPY_BASE_URL="${CANOPY_BASE_URL%/}"
        fi

        if [ -z "$(trim_ws "${CUSTODIAN_URL:-}")" ]; then
          echo "CUSTODIAN_URL is required for system e2e (Doppler project canopy, config {{.ENV}})." >&2
          exit 1
        fi
        if [ -z "$(trim_ws "${CUSTODIAN_APP_TOKEN:-}")" ]; then
          echo "CUSTODIAN_APP_TOKEN is required for system e2e (Doppler project canopy, config {{.ENV}})." >&2
          exit 1
        fi
        if [ -z "$(trim_ws "${CANOPY_OPS_ADMIN_TOKEN:-}")" ]; then
          echo "CANOPY_OPS_ADMIN_TOKEN is required for system e2e (Doppler project canopy, config {{.ENV}})." >&2
          exit 1
        fi
        if [ "${VALIDATE_REQUIRE_COORDINATOR:-}" = "1" ]; then
          COORD_URL="$(trim_ws "${DELEGATION_COORDINATOR_URL:-}")"
          COORD_TOKEN="$(trim_ws "${COORDINATOR_APP_TOKEN:-}")"
          if [ -z "$COORD_URL" ] || [ -z "$COORD_TOKEN" ]; then
            echo "DELEGATION_COORDINATOR_URL and COORDINATOR_APP_TOKEN are required when VALIDATE_REQUIRE_COORDINATOR=1 (system BYOK / Mode C e2e)." >&2
            exit 1
          fi
        fi

        if [ "${VALIDATE_SKIP_UNIVOCITY:-}" != "1" ]; then
          if [ -f "{{.E2E_UNIVOCITY_ENV_FILE}}" ]; then
            set -a
            # shellcheck source=/dev/null
            . "{{.E2E_UNIVOCITY_ENV_FILE}}"
            set +a
          fi
          SKIP_CHAIN="$(trim_ws "${E2E_SKIP_UNIVOCITY_CHAIN_BINDING:-}")"
          if [ "$SKIP_CHAIN" = "true" ]; then
            echo "Univocity chain-binding skipped (SKIP_UNIVOCITY_PROVISION)."
          else
            if [ -z "$(trim_ws "${E2E_UNIVOCITY_ADDRESS_ES256_BOOTSTRAP:-}")" ]; then
              echo "E2E_UNIVOCITY_ADDRESS_ES256_BOOTSTRAP is required for Univocity chain-binding e2e." >&2
              echo "Run test:e2e:preflight without SKIP_UNIVOCITY_PROVISION." >&2
              exit 1
            fi
            if [ -z "$(trim_ws "${E2E_UNIVOCITY_ADDRESS_KS256_BOOTSTRAP:-}")" ]; then
              echo "E2E_UNIVOCITY_ADDRESS_KS256_BOOTSTRAP is required for Univocity chain-binding e2e." >&2
              echo "Run test:e2e:preflight without SKIP_UNIVOCITY_PROVISION." >&2
              exit 1
            fi
            if [ -z "$(trim_ws "${E2E_UNIVOCITY_GENESIS_LOG_ID_ES256:-}")" ]; then
              echo "E2E_UNIVOCITY_GENESIS_LOG_ID_ES256 is required for Univocity chain-binding e2e." >&2
              echo "Run test:e2e:preflight without SKIP_UNIVOCITY_PROVISION." >&2
              exit 1
            fi
            if [ -z "$(trim_ws "${E2E_UNIVOCITY_GENESIS_LOG_ID_KS256:-}")" ]; then
              echo "E2E_UNIVOCITY_GENESIS_LOG_ID_KS256 is required for Univocity chain-binding e2e." >&2
              echo "Run test:e2e:preflight without SKIP_UNIVOCITY_PROVISION." >&2
              exit 1
            fi
          fi
        fi

        TIMEOUT_MS="${E2E_PREFLIGHT_FETCH_TIMEOUT_MS:-20000}"
        TIMEOUT_SEC=$((TIMEOUT_MS / 1000))
        if [ "$TIMEOUT_SEC" -lt 1 ]; then
          TIMEOUT_SEC=1
        fi
        HEALTH_URL="${CANOPY_BASE_URL}/api/health"
        if ! curl -fsS --max-time "$TIMEOUT_SEC" "$HEALTH_URL" >/dev/null; then
          echo "Canopy health check failed: GET ${HEALTH_URL} (timeout ${TIMEOUT_MS}ms)." >&2
          exit 1
        fi
        echo "e2e env OK (Canopy ${CANOPY_BASE_URL})"

  validate-univocity-deploy:
    desc: |
      Fail when deployed arbor univocity lacks FOR-123 (ADR-0006 BYOK genesis).
      Uses UNIVOCITY_SERVICE_URL/version. Opt out: E2E_SKIP_UNIVOCITY_DEPLOY_READINESS=true
    cmds:
      - |
        set -euo pipefail
        MIN_COMMIT="${E2E_UNIVOCITY_MIN_COMMIT:-366b223}"
        KNOWN_BAD_PREFIX="af7c340"
        SKIP_FLAG="$(printf '%s' "${E2E_SKIP_UNIVOCITY_DEPLOY_READINESS:-}" | tr 'A-Z' 'a-z')"
        trim_ws() { printf '%s' "$1" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }

        if [ "$SKIP_FLAG" = "true" ] || [ "$SKIP_FLAG" = "1" ]; then
          echo "Skipping univocity deploy readiness (E2E_SKIP_UNIVOCITY_DEPLOY_READINESS)."
          exit 0
        fi

        URL="$(trim_ws "${UNIVOCITY_SERVICE_URL:-}")"
        if [ -z "$URL" ]; then
          echo "UNIVOCITY_SERVICE_URL not set; skipping arbor univocity deploy readiness."
          exit 0
        fi

        TIMEOUT_SEC="${E2E_UNIVOCITY_VERSION_TIMEOUT_SEC:-15}"
        if [ "$TIMEOUT_SEC" -lt 1 ]; then
          TIMEOUT_SEC=1
        fi
        VERSION_URL="${URL%/}/version"

        if ! BODY="$(curl -fsS --max-time "$TIMEOUT_SEC" "$VERSION_URL" 2>&1)"; then
          echo "Univocity deploy readiness failed: GET ${VERSION_URL} — ${BODY}" >&2
          echo "Check Flux Kustomization arbor-flux-a, univocity rollout, and ingress." >&2
          echo "See plan-0047 / arbor ADR-0006 (FOR-123 genesis-authoritative BYOK)." >&2
          exit 1
        fi

        COMMIT=""
        if command -v jq >/dev/null 2>&1; then
          COMMIT="$(printf '%s' "$BODY" | jq -r '.commit // empty' 2>/dev/null || true)"
        fi
        if [ -z "$COMMIT" ]; then
          COMMIT="$(printf '%s' "$BODY" | sed -n 's/.*"commit"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -1)"
        fi
        if [ -z "$COMMIT" ]; then
          echo "Univocity /version response missing commit: ${BODY}" >&2
          exit 1
        fi

        SHORT="${COMMIT:0:7}"
        if [ "$SHORT" = "$KNOWN_BAD_PREFIX" ]; then
          echo "Univocity runtime commit ${SHORT} is pre-FOR-123; Mode C BYOK register-grant returns 403." >&2
          echo "Promote arbor-flux image tags (flux/image-updates merge) and reconcile cluster." >&2
          exit 1
        fi

        ARBOR_REPO="$(trim_ws "${E2E_ARBOR_REPO:-}")"
        if [ -z "$ARBOR_REPO" ]; then
          for candidate in "{{.ROOT_DIR}}/../arbor" "{{.ROOT_DIR}}/../../arbor"; do
            if [ -d "${candidate}/.git" ]; then
              ARBOR_REPO="$candidate"
              break
            fi
          done
        fi
        if [ -n "$ARBOR_REPO" ] && [ -d "${ARBOR_REPO}/.git" ]; then
          if git -C "$ARBOR_REPO" cat-file -e "${MIN_COMMIT}^{commit}" 2>/dev/null; then
            if ! git -C "$ARBOR_REPO" merge-base --is-ancestor "$MIN_COMMIT" "$COMMIT" 2>/dev/null; then
              echo "Univocity commit ${SHORT} does not include FOR-123 (${MIN_COMMIT})." >&2
              echo "Mode C BYOK register-grant requires genesis-authoritative bootstrap (ADR-0006)." >&2
              exit 1
            fi
          fi
        fi

        echo "Univocity deploy readiness OK (commit ${SHORT}; FOR-123 / ADR-0006)."

  provision-univocity:
    desc: |
      Deploy ephemeral es256+ks256 ImutableUnivocity (default in preflight).
      Opt out: SKIP_UNIVOCITY_PROVISION=true or E2E_SKIP_UNIVOCITY_PROVISION=true
    vars:
      SKIP:
        sh: |
          if [ "{{.SKIP_UNIVOCITY_PROVISION | default "false"}}" = "true" ]; then
            echo true
            exit 0
          fi
          FLAG="$(printf '%s' "${E2E_SKIP_UNIVOCITY_PROVISION:-}" | tr 'A-Z' 'a-z')"
          if [ "$FLAG" = "true" ]; then
            echo true
            exit 0
          fi
          echo false
    cmds:
      - |
        set -euo pipefail
        if [ "{{.SKIP}}" = "true" ]; then
          echo "Skipping Univocity provision (SKIP_UNIVOCITY_PROVISION)."
          task e2e-univocity:write-skip-env-file
          exit 0
        fi

        RUN_ID="${E2E_PROVISION_RUN_ID:-$(date +%s)}"
        export E2E_PROVISION_RUN_ID="$RUN_ID"
        echo "Ephemeral Univocity provision (RUN_ID=${RUN_ID})"

        DEPLOYER="{{.ROOT_DIR}}/.cache/univocity-tools/deployer"
        if [ ! -x "$DEPLOYER" ]; then
          SIBLING="{{.ROOT_DIR}}/../univocity-tools/Taskfile.dist.yml"
          if [ -f "$SIBLING" ]; then
            task install:dev
          elif [ "{{OS}}" = "linux" ]; then
            task install:release
          else
            task install:dev
          fi
        fi

        trim_ws() { printf '%s' "$1" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
        RPC="$(trim_ws "${E2E_UNIVOCITY_RPC_URL:-}")"
        if [ -z "$RPC" ]; then
          echo "E2E_UNIVOCITY_RPC_URL is required for Univocity provision (Doppler project canopy, config {{.ENV}})." >&2
          exit 1
        fi
        export RPC_URL="$RPC"

        task e2e-univocity:provision

        MANIFEST_ES256="{{.PROPOSAL_DIR}}/provision-${RUN_ID}-es256.manifest"
        MANIFEST_KS256="{{.PROPOSAL_DIR}}/provision-${RUN_ID}-ks256.manifest"
        if [ ! -f "$MANIFEST_ES256" ] || [ ! -f "$MANIFEST_KS256" ]; then
          echo "missing provision manifest pointers for RUN_ID=${RUN_ID}" >&2
          echo "  expected: $MANIFEST_ES256" >&2
          echo "  expected: $MANIFEST_KS256" >&2
          exit 1
        fi
        MANIFEST_ES256=$(cat "$MANIFEST_ES256")
        MANIFEST_KS256=$(cat "$MANIFEST_KS256")

        task e2e-univocity:write-env-file \
          MANIFEST_ES256="$MANIFEST_ES256" \
          MANIFEST_KS256="$MANIFEST_KS256"
        echo "Wrote {{.E2E_UNIVOCITY_ENV_FILE}}"

  run-full:
    desc: Run full dev Playwright suite (CI-parity project sequence).
    cmds:
      - bash taskfiles/e2e-run-playwright.sh
