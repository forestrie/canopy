---
# Cloudflare infrastructure management using Wrangler

version: "3"

vars:
  # Environment: dev (default) or prod
  ENV: '{{.ENV | default "dev"}}'
  # Derived IDs based on environment
  CANOPY_ID: '{{.CANOPY_ID | default (print "canopy-" .ENV "-1")}}'
  R2_BUCKET_NAME_MERKLELOGS: '{{.R2_BUCKET_NAME_MERKLELOGS | default (print "arbor-" .ENV "-1-logs")}}'
  R2_BUCKET_NAME_GRANTS: '{{.R2_BUCKET_NAME_GRANTS | default (print .CANOPY_ID "-grants")}}'
  BUCKET_PREFIX_MASSIFS: "v2/merklelog/massifs/"
  BUCKET_PREFIX_CHECKPOINTS: "v2/merklelog/checkpoints/"

tasks:
  bootstrap:
    desc: Bootstrap dev Cloudflare resources
    cmds:
      - task: validate
      - task: create
      - task: sync
      - task: status

  bootstrap:prod:
    desc: Bootstrap prod Cloudflare resources
    cmds:
      - task: validate
      - task: create
        vars:
          ENV: prod
          CANOPY_ID: canopy-prod-1
          R2_BUCKET_NAME_MERKLELOGS: arbor-prod-1-logs
      - task: sync
        vars:
          ENV: prod
      - task: status
        vars:
          ENV: prod
          R2_BUCKET_NAME_MERKLELOGS: arbor-prod-1-logs

  create:
    desc: Create all Cloudflare resources (R2 buckets, queues, and event notifications)
    cmds:
      - task: bucket:create
      - task: bucket:create:grants
      - task: queue:create:sealer
      - task: queue:create:forester
      - task: queue:create:x402-settlement
      - task: r2notification:create:sealer
        vars:
          R2_BUCKET_NAME: "{{ .R2_BUCKET_NAME_MERKLELOGS }}"
          PREFIX: "{{.BUCKET_PREFIX_MASSIFS}}"
      - task: r2notification:create:forester
        vars:
          R2_BUCKET_NAME: "{{ .R2_BUCKET_NAME_MERKLELOGS }}"
          PREFIX: "{{.BUCKET_PREFIX_MASSIFS}}"
      - cmd: echo "Resources provisioned. Run 'task cloudflare:sync' to apply Wrangler bindings."

  sync:
    desc: Deploy workers and configure queue consumers
    cmds:
      - task: validate
      - task: :wrangler:deploy:canopy-api
        vars:
          ENV: "{{.ENV}}"
      - task: queue:http-enable:sealer
      - task: queue:http-enable:forester

  destroy:
    desc: Delete all Cloudflare resources (DESTRUCTIVE!)
    deps:
      - queue:delete:sealer
      - queue:delete:forester
      - bucket:delete
    cmds:
      - cmd: echo "Destruction complete"

  status:
    desc: Show status of all Cloudflare resources
    cmds:
      - task: validate
      - cmd: |
          echo "--------- :buckets: --------------------------------------------------"
          yes n | wrangler r2 bucket list
      - cmd: |
          echo "--------- :queues:  --------------------------------------------------"
          yes n | wrangler queues list
      - cmd: |
          echo "--------- :bucket notifications:  ------------------------------------"
          yes n | wrangler r2 bucket notification list "{{.R2_BUCKET_NAME_MERKLELOGS}}" 2>/dev/null || echo "  No notifications configured"

  validate:
    desc: Validate Wrangler is installed and authenticated
    cmds:
      - cmd: |
          if ! command -v wrangler &> /dev/null; then
            echo "ERROR: wrangler not found. Install with 'pnpm add -g wrangler'"
            exit 1
          fi
      - cmd: |
          if ! wrangler whoami &> /dev/null; then
            echo "ERROR: Wrangler is not authenticated. Run: wrangler login"
            exit 1
          fi

  bucket:create:
    desc: Create R2 bucket for merklelog massifs/checkpoints
    cmds:
      - cmd: yes n | wrangler r2 bucket create "{{.R2_BUCKET_NAME_MERKLELOGS}}" --location weur 2>/dev/null || echo "Bucket {{.R2_BUCKET_NAME_MERKLELOGS}} may already exist"

  bucket:create:grants:
    desc: Create R2 bucket for grant storage (canopy-api R2_GRANTS binding)
    cmds:
      - cmd: yes n | wrangler r2 bucket create "{{.R2_BUCKET_NAME_GRANTS}}" --location weur 2>/dev/null || echo "Bucket {{.R2_BUCKET_NAME_GRANTS}} may already exist"

  bucket:lifecycle:used-auth:
    desc: |
      Expire spent x402 payment-authorization claims (RM6, FOR-441).

      canopy-api writes a claim per payment under payments/used-auth/ to make an
      authorization single-use. Those records are never rewritten and would grow
      without bound, so R2 expires them by age instead of us running a sweep
      (listing a flat content-addressed prefix is O(all claims) per pass).

      SAFETY — the expiry window MUST exceed the payment validity window.
      A claim written at T guards an EIP-3009 authorization whose validBefore is
      at most T + maxTimeoutSeconds (300s, see canopy-api scrapi/x402.ts). Past
      validBefore the authorization can never settle, so the claim can never be
      needed again -- 1 day is a ~288x margin. On-chain nonce state is the
      ultimate backstop regardless: a settled authorization is rejected with
      invalid_exact_evm_nonce_already_used.
      If maxTimeoutSeconds is ever raised near this window, RAISE THIS TOO.
    cmds:
      - cmd: |
          wrangler r2 bucket lifecycle add "{{.R2_BUCKET_NAME_GRANTS}}" \
            expire-used-auth payments/used-auth/ --expire-days 1 --force \
            || echo "lifecycle rule expire-used-auth may already exist"
          wrangler r2 bucket lifecycle list "{{.R2_BUCKET_NAME_GRANTS}}"

  bucket:empty:
    desc: Delete all objects in the R2 bucket (DESTRUCTIVE!)
    cmds:
      - cmd: |
          BUCKET="{{.R2_BUCKET_NAME_MERKLELOGS}}"
          while true; do
            OBJECTS=$(yes n | wrangler r2 object list "$BUCKET" 2>/dev/null)
            if [ $? -ne 0 ]; then
              echo "ERROR: Failed to list objects in bucket $BUCKET" >&2
              exit 1
            fi
            KEYS=$(echo "$OBJECTS" | jq -r '.[].key // empty' 2>/dev/null)
            if [ -z "$KEYS" ]; then
              break
            fi
            echo "$KEYS" | while IFS= read -r key; do
              [ -z "$key" ] && continue
              if ! yes n | wrangler r2 object delete "$BUCKET" "$key" >/dev/null 2>&1; then
                echo "ERROR: Failed to delete object $key" >&2
              fi
            done
          done

  bucket:empty:grants:
    desc: Delete all objects in the R2 grants bucket (DESTRUCTIVE!)
    cmds:
      - cmd: |
          BUCKET="{{.R2_BUCKET_NAME_GRANTS}}"
          while true; do
            OBJECTS=$(yes n | wrangler r2 object list "$BUCKET" 2>/dev/null)
            if [ $? -ne 0 ]; then
              echo "ERROR: Failed to list objects in bucket $BUCKET" >&2
              exit 1
            fi
            KEYS=$(echo "$OBJECTS" | jq -r '.[].key // empty' 2>/dev/null)
            if [ -z "$KEYS" ]; then
              break
            fi
            echo "$KEYS" | while IFS= read -r key; do
              [ -z "$key" ] && continue
              if ! yes n | wrangler r2 object delete "$BUCKET" "$key" >/dev/null 2>&1; then
                echo "ERROR: Failed to delete object $key" >&2
              fi
            done
          done

  bucket:delete:
    desc: Delete R2 bucket for merklelog massifs/checkpoints (DESTRUCTIVE! Bucket must be empty)
    cmds:
      - cmd: yes n | wrangler r2 bucket delete "{{.R2_BUCKET_NAME_MERKLELOGS}}" 2>/dev/null || echo "Bucket {{.R2_BUCKET_NAME_MERKLELOGS}} not found or not empty"

  kv:list:
    desc: List {{.CANOPY_ID}}-* Cloudflare KV namespaces
    cmds:
      - cmd: |
          OUTPUT=$(yes n | wrangler kv namespace list 2>/dev/null || echo "[]")
          echo "$OUTPUT" | jq -r --arg canopy "{{.CANOPY_ID}}" '.[] | select(.title | startswith($canopy + "-")) | "\(.id)  \(.title)"'

  kv:create:*:
    desc: Create Cloudflare KV namespace
    vars:
      NAME: "{{index .MATCH 0}}"
      KV_STORE_NAME: '{{.KV_STORE_NAME | default (print .CANOPY_ID "-" .NAME)}}'
    cmds:
      - cmd: yes n | wrangler kv namespace create "{{.KV_STORE_NAME}}" || echo "KV namespace {{.KV_STORE_NAME}} may already exist"

  kv:bind:*:
    desc: Ensure Wrangler KV binding exists and is up to date for a namespace
    vars:
      NAME: "{{index .MATCH 0}}"
      KV_STORE_NAME: '{{.KV_STORE_NAME | default (print .CANOPY_ID "-" .NAME)}}'
      WFILE: "{{.WFILE}}"
    requires:
      vars: [WFILE]
    cmds:
      - cmd: |
          WFILE="{{.WFILE}}"

          OUTPUT=$(yes n | wrangler kv namespace list 2>/dev/null || echo "[]")
          NAMESPACE_ID=$(echo "$OUTPUT" | jq -r --arg name "{{.KV_STORE_NAME}}" '.[] | select(.title == $name) | .id' | head -n 1)
          if [ -z "$NAMESPACE_ID" ] || [ "$NAMESPACE_ID" = "null" ]; then
            echo "No KV namespace found with title {{.KV_STORE_NAME}}" >&2
            exit 1
          fi

          BINDING_NAME=$(printf '%s\n' "{{.NAME}}" | tr '-' '_' | tr "[:lower:]" "[:upper:]")
          TMP=$(mktemp)

          jq --arg binding "$BINDING_NAME" --arg id "$NAMESPACE_ID" '
            .kv_namespaces = (
              (.kv_namespaces // [])
              | map(select(.binding != $binding))
              + [{"binding": $binding, "id": $id}]
            )
          ' "${WFILE}" > "$TMP"
          mv "$TMP" "${WFILE}"

  kv:destroy:all:
    desc: Delete all well-known Cloudflare KV namespaces (DESTRUCTIVE!)
    cmds:
      - task: kv:destroy:massifs
      - task: kv:destroy:fenced-entries

  kv:destroy:*:
    desc: Delete Cloudflare KV namespace (DESTRUCTIVE!)
    vars:
      NAME: "{{index .MATCH 0}}"
      KV_STORE_NAME: '{{.KV_STORE_NAME | default (print .CANOPY_ID "-" .NAME)}}'
    cmds:
      - cmd: |
          OUTPUT=$(yes n | wrangler kv namespace list 2>/dev/null || echo "[]")
          NAMESPACE_ID=$(echo "$OUTPUT" | jq -r --arg name "{{.KV_STORE_NAME}}" '.[] | select(.title == $name) | .id' | head -n 1)

          if [ -z "$NAMESPACE_ID" ]; then
            echo "KV namespace {{.KV_STORE_NAME}} not found"
            exit 1
          fi
          yes n | wrangler kv namespace delete --namespace-id="$NAMESPACE_ID" || echo "KV namespace {{.KV_STORE_NAME}} not found"

  kv:id:*:
    desc: Get the id of the {{.CANOPY_ID}}-* Cloudflare KV store
    vars:
      NAME: "{{index .MATCH 0}}"
      KV_STORE_NAME: '{{.KV_STORE_NAME | default (print .CANOPY_ID "-" .NAME)}}'
    cmds:
      - cmd: |
          OUTPUT=$(yes n | wrangler kv namespace list 2>/dev/null || echo "[]")
          NAMESPACE_ID=$(echo "$OUTPUT" | jq -r --arg name "{{.KV_STORE_NAME}}" '.[] | select(.title == $name) | .id' | head -n 1)

          if [ -z "$NAMESPACE_ID" ]; then
            echo "KV namespace {{.KV_STORE_NAME}} not found" >&2
            exit 1
          fi
          echo "$NAMESPACE_ID"

  queue:create:*:
    desc: Create a Cloudflare queue and its dead-letter queue
    vars:
      NAME: "{{index .MATCH 0}}"
      QUEUE_NAME: '{{.QUEUE_NAME | default (print .CANOPY_ID "-" .NAME)}}'
      QUEUE_DLQ_NAME: '{{.QUEUE_DLQ_NAME | default (print .QUEUE_NAME "-dlq")}}'
    cmds:
      - cmd: |
          yes n | wrangler queues create "{{.QUEUE_NAME}}" || echo "Queue {{.QUEUE_NAME}} may already exist"
          yes n | wrangler queues create "{{.QUEUE_DLQ_NAME}}" || echo "DLQ {{.QUEUE_DLQ_NAME}} may already exist"

  queue:http-enable:*:
    desc: Ensure HTTP pull consumer is configured on a queue
    vars:
      NAME: "{{index .MATCH 0}}"
      QUEUE_NAME: '{{.QUEUE_NAME | default (print .CANOPY_ID "-" .NAME)}}'
    cmds:
      - cmd: |
          yes n | wrangler queues consumer http add "{{.QUEUE_NAME}}" || echo "HTTP pull already configured for {{.QUEUE_NAME}}"

  queue:inspect:*:
    desc: Show queue configuration (including consumer type)
    vars:
      NAME: "{{index .MATCH 0}}"
      QUEUE_NAME: '{{.QUEUE_NAME | default (print .CANOPY_ID "-" .NAME)}}'
    cmds:
      - cmd: |
          doppler run --project canopy --config {{.ENV | default "dev"}} -- bash -c '
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "ERROR: CLOUDFLARE_API_TOKEN is not set in Doppler (project canopy, config {{.ENV | default "dev"}})." >&2
            exit 1
          fi
          if ! command -v jq >/dev/null 2>&1; then
            echo "jq is required for queue:inspect:*" >&2
            exit 1
          fi
          RESPONSE=$(curl -fsS \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/{{.CLOUDFLARE_ACCOUNT_ID}}/queues/{{.QUEUE_NAME}}") || exit 1
          echo "$RESPONSE" | jq .
          '

  queue:delete:*:
    desc: Delete a Cloudflare queue and its dead-letter queue (DESTRUCTIVE!)
    vars:
      NAME: "{{index .MATCH 0}}"
      QUEUE_NAME: '{{.QUEUE_NAME | default (print .CANOPY_ID "-" .NAME)}}'
      QUEUE_DLQ_NAME: '{{.QUEUE_DLQ_NAME | default (print .QUEUE_NAME "-dlq")}}'
    cmds:
      - cmd: |
          yes n | wrangler queues delete "{{.QUEUE_NAME}}"
          yes n | wrangler queues delete "{{.QUEUE_DLQ_NAME}}"

  r2notification:create:*:
    desc: Create R2 event notification to queue
    vars:
      NAME: "{{index .MATCH 0}}"
      QUEUE_NAME: '{{.QUEUE_NAME | default (print .CANOPY_ID "-" .NAME)}}'
      PREFIX: "{{.PREFIX}}"
      R2_BUCKET_NAME: "{{.R2_BUCKET_NAME}}"
    requires:
      vars: [R2_BUCKET_NAME]
    cmds:
      - cmd: |
          if [ -z "{{.PREFIX}}" ]; then
            echo "PREFIX must be set for r2notification:create:*" >&2
            exit 1
          fi
          yes n | wrangler r2 bucket notification create "{{.R2_BUCKET_NAME}}" \
            --event-type object-create \
            --queue "{{.QUEUE_NAME}}" \
            --prefix "{{.PREFIX}}" || echo "Notification may already be configured"

  genesis:delete:
    desc: Delete a forest genesis doc from R2_GRANTS (DESTRUCTIVE!) — LOG_ID=<uuid|32-hex>
    requires:
      vars: [LOG_ID]
    cmds:
      - cmd: |
          set -euo pipefail
          UUID=$(
            LOG_ID="{{.LOG_ID}}" python3 <<'PY'
          import os, re, sys
          raw = os.environ["LOG_ID"].strip().lower()
          if raw.startswith("0x"):
              raw = raw[2:]
          raw = raw.replace("-", "")
          if not re.fullmatch(r"[0-9a-f]+", raw or ""):
              sys.exit(f"LOG_ID must be hex (uuid or 32-hex); got {raw!r}")
          if len(raw) == 64:
              raw = raw[-32:]
          if len(raw) != 32:
              sys.exit(f"LOG_ID must resolve to 32 hex chars; got {len(raw)}")
          print(f"{raw[0:8]}-{raw[8:12]}-{raw[12:16]}-{raw[16:20]}-{raw[20:32]}")
          PY
          )
          KEY="forests/forest/${UUID}/genesis.cbor"
          echo "Deleting ${KEY} from {{.R2_BUCKET_NAME_GRANTS}}"
          yes n | wrangler r2 object delete --remote "{{.R2_BUCKET_NAME_GRANTS}}/${KEY}" || test $? -eq 141

  mmr:delete:
    desc: Delete a single log's massif/checkpoint tiles from merklelogs (DESTRUCTIVE!) — LOG_ID=<uuid|64-hex>
    requires:
      vars: [LOG_ID]
    cmds:
      - cmd: |
          set -euo pipefail
          UUID=$(
            LOG_ID="{{.LOG_ID}}" python3 <<'PY'
          import os, re, sys
          raw = os.environ["LOG_ID"].strip().lower()
          if raw.startswith("0x"):
              raw = raw[2:]
          raw = raw.replace("-", "")
          if not re.fullmatch(r"[0-9a-f]+", raw or ""):
              sys.exit(f"LOG_ID must be hex (uuid or 64-hex); got {raw!r}")
          if len(raw) == 64:
              raw = raw[32:]
          if len(raw) != 32:
              sys.exit(f"LOG_ID must resolve to a 32-hex uuid; got {len(raw)} hex")
          print(f"{raw[0:8]}-{raw[8:12]}-{raw[12:16]}-{raw[16:20]}-{raw[20:32]}")
          PY
          )
          BUCKET="{{.R2_BUCKET_NAME_MERKLELOGS}}"
          echo "Deleting massif/checkpoint tiles for log ${UUID} from ${BUCKET}"
          for PREFIX in "{{.BUCKET_PREFIX_MASSIFS}}" "{{.BUCKET_PREFIX_CHECKPOINTS}}"; do
            OBJECTS=$(yes n | wrangler r2 object list "$BUCKET" --prefix "$PREFIX" 2>/dev/null)
            if [ $? -ne 0 ]; then
              echo "ERROR: Failed to list objects under $PREFIX" >&2
              exit 1
            fi
            KEYS=$(echo "$OBJECTS" | jq -r --arg seg "/${UUID}/" '.[] | select(.key | contains($seg)) | .key' 2>/dev/null)
            if [ -z "$KEYS" ]; then
              echo "  no objects under $PREFIX for ${UUID}"
              continue
            fi
            echo "$KEYS" | while IFS= read -r key; do
              [ -z "$key" ] && continue
              echo "  delete ${key}"
              if ! yes n | wrangler r2 object delete "$BUCKET" "$key" >/dev/null 2>&1; then
                echo "ERROR: Failed to delete object $key" >&2
              fi
            done
          done

  r2notification:delete:*:
    desc: Delete R2 event notifications
    vars:
      NAME: "{{index .MATCH 0}}"
      QUEUE_NAME: '{{.QUEUE_NAME | default (print .CANOPY_ID "-" .NAME)}}'
      R2_BUCKET_NAME: "{{.R2_BUCKET_NAME}}"
    requires:
      vars: [R2_BUCKET_NAME]
    cmds:
      - cmd: |
          yes n | wrangler r2 bucket notification list "{{.R2_BUCKET_NAME}}" | grep -q "v2/merklelog/massifs/" && \
            yes n | wrangler r2 bucket notification delete "{{.R2_BUCKET_NAME}}" --queue "{{.QUEUE_NAME}}" || \
            echo "No notifications to delete"

  coordinator:bootstrap-webhook-signing-key:
    desc: |
      Generate WEBHOOK_SIGNING_KEY_PEM in Doppler canopy dev+prd if missing (idempotent).
      Requires doppler CLI auth. Account-level ES256 coordinator identity key (ADR-0006).
    cmds:
      - cmd: |
          set -euo pipefail
          PROJECT=canopy
          if doppler secrets get WEBHOOK_SIGNING_KEY_PEM -p "${PROJECT}" -c dev --plain >/dev/null 2>&1 \
            && doppler secrets get WEBHOOK_SIGNING_KEY_PEM -p "${PROJECT}" -c prd --plain >/dev/null 2>&1; then
            echo "WEBHOOK_SIGNING_KEY_PEM already set in ${PROJECT}/dev and ${PROJECT}/prd — no-op"
            exit 0
          fi
          PEM="$(openssl ecparam -genkey -name prime256v1 2>/dev/null | openssl pkcs8 -topk8 -nocrypt 2>/dev/null)"
          if [ -z "${PEM}" ] || ! printf '%s' "${PEM}" | grep -q 'BEGIN PRIVATE KEY'; then
            echo "ERROR: failed to generate PKCS#8 ES256 PEM" >&2
            exit 1
          fi
          for CONFIG in dev prd; do
            printf '%s' "${PEM}" | doppler secrets set WEBHOOK_SIGNING_KEY_PEM \
              -p "${PROJECT}" -c "${CONFIG}" --visibility masked --silent
            echo "Set WEBHOOK_SIGNING_KEY_PEM in ${PROJECT}/${CONFIG}"
          done
          echo "Next steps:"
          echo "  1. gh secret set WEBHOOK_SIGNING_KEY_PEM --env dev --repo forestrie/canopy"
          echo "  2. gh secret set WEBHOOK_SIGNING_KEY_PEM --env prod --repo forestrie/canopy (same PEM)"
          echo "  3. doppler run --project canopy --config dev -- task cf:coordinator:ensure-webhook-signing-key"

  coordinator:ensure-webhook-signing-key:
    desc: |
      Ensure Cloudflare Secrets Store forestrie-coordinator + webhook-signing-key exist.
      Reads WEBHOOK_SIGNING_KEY_PEM from env (Doppler or GitHub). Idempotent create-if-absent.
      Requires CLOUDFLARE_ACCOUNT_ID and CLOUDFLARE_API_TOKEN.
    deps:
      - validate
    cmds:
      - cmd: |
          set -euo pipefail
          python3 << 'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          CF = "https://api.cloudflare.com/client/v4"
          PREFERRED_STORE_NAME = os.environ.get(
              "COORDINATOR_SECRETS_STORE_NAME", "forestrie-coordinator"
          )
          FALLBACK_STORE_NAME = "default_secrets_store"
          SECRET_NAME = "webhook-signing-key"

          def env_required(key: str) -> str:
              value = os.environ.get(key, "").strip()
              if not value:
                  print(f"{key} must be set", file=sys.stderr)
                  sys.exit(1)
              return value

          account_id = env_required("CLOUDFLARE_ACCOUNT_ID")
          cf_api = env_required("CLOUDFLARE_API_TOKEN")
          pem = env_required("WEBHOOK_SIGNING_KEY_PEM")
          if "BEGIN PRIVATE KEY" not in pem:
              print("WEBHOOK_SIGNING_KEY_PEM must be PKCS#8 PEM", file=sys.stderr)
              sys.exit(1)

          def cf_json(method: str, path: str, body=None, *, fatal: bool = True):
              url = f"{CF}{path}"
              data = None if body is None else json.dumps(body).encode("utf-8")
              req = urllib.request.Request(
                  url,
                  data=data,
                  method=method,
                  headers={
                      "Authorization": f"Bearer {cf_api}",
                      "Content-Type": "application/json",
                  },
              )
              try:
                  with urllib.request.urlopen(req, timeout=60) as resp:
                      return json.loads(resp.read().decode("utf-8"))
              except urllib.error.HTTPError as e:
                  err = e.read().decode("utf-8", errors="replace")
                  try:
                      parsed = json.loads(err)
                  except json.JSONDecodeError:
                      parsed = None
                  if not fatal and parsed is not None:
                      return parsed
                  print(
                      f"Cloudflare API {method} {path} failed: HTTP {e.code} {err}",
                      file=sys.stderr,
                  )
                  sys.exit(1)

          stores_resp = cf_json(
              "GET", f"/accounts/{account_id}/secrets_store/stores?per_page=50"
          )
          if not stores_resp.get("success"):
              print("secrets_store stores list failed", file=sys.stderr)
              sys.exit(1)
          stores = stores_resp.get("result") or []

          def find_store(name: str):
              return next(
                  (s for s in stores if s.get("name") == name or s.get("id") == name),
                  None,
              )

          store = find_store(PREFERRED_STORE_NAME)
          if store is None:
              created = cf_json(
                  "POST",
                  f"/accounts/{account_id}/secrets_store/stores",
                  {"name": PREFERRED_STORE_NAME},
                  fatal=False,
              )
              if created.get("success"):
                  store = created["result"]
                  print(
                      f"Created Secrets Store {PREFERRED_STORE_NAME} "
                      f"(id={store.get('id')})"
                  )
              else:
                  errors = created.get("errors") or []
                  codes = {e.get("code") for e in errors}
                  messages = " ".join(
                      str(e.get("message", "")) for e in errors
                  )
                  if 1003 in codes or "maximum_stores_exceeded" in messages:
                      store = find_store(FALLBACK_STORE_NAME) or (
                          stores[0] if len(stores) == 1 else None
                      )
                      if store is None:
                          print(
                              "Cannot create preferred store (account store limit); "
                              f"no fallback {FALLBACK_STORE_NAME} found",
                              file=sys.stderr,
                          )
                          sys.exit(1)
                      print(
                          f"Using existing store {store.get('name')} "
                          f"(id={store.get('id')}); account store limit reached"
                      )
                  else:
                      print("secrets_store store create failed", file=sys.stderr)
                      sys.exit(1)
          else:
              print(
                  f"Secrets Store {store.get('name')} exists (id={store.get('id')})"
              )

          store_id = store["id"]
          secrets_resp = cf_json(
              "GET",
              f"/accounts/{account_id}/secrets_store/stores/{store_id}/secrets?per_page=50",
          )
          if not secrets_resp.get("success"):
              print("secrets_store secret list failed", file=sys.stderr)
              sys.exit(1)
          secrets = secrets_resp.get("result") or []
          if any(s.get("name") == SECRET_NAME for s in secrets):
              print(f"Secret {SECRET_NAME} already exists — no-op")
              sys.exit(0)

          created_secret = cf_json(
              "POST",
              f"/accounts/{account_id}/secrets_store/stores/{store_id}/secrets",
              [
                  {
                      "name": SECRET_NAME,
                      "value": pem,
                      "scopes": ["workers"],
                      "comment": "Coordinator ES256 webhook identity (ADR-0006)",
                  }
              ],
          )
          if not created_secret.get("success"):
              print("secrets_store secret create failed", file=sys.stderr)
              sys.exit(1)
          print(f"Created secret {SECRET_NAME} in store {store.get('name')}")
          PY
