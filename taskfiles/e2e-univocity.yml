# E2e Univocity provisioning (canopy-native fetch + deploy).
# CI mirrors this flow in pr-dev-deploy-e2e.yml provision-univocity.
# Local: doppler run -- task e2e-univocity:provision RUN_ID=local-test
version: "3"

vars:
  MANIFEST: "{{.MANIFEST}}"
  RPC_URL: '{{.RPC_URL | default ""}}'
  UNIVOCITY_TOOLS_VERSION: '{{.UNIVOCITY_TOOLS_VERSION | default "latest"}}'
  TOOLS_CACHE_DIR: "{{.ROOT_DIR}}/.cache/univocity-tools"
  DEPLOYER_BIN: "{{.TOOLS_CACHE_DIR}}/deployer-linux-x64"
  CART_BIN: "{{.TOOLS_CACHE_DIR}}/contract-artefacts-linux-x64"
  WORK_DIR: "{{.ROOT_DIR}}/.work/univocity-e2e"
  RELEASE_ROOT: "{{.ROOT_DIR}}/.work/univocity-release"
  OWNER_ADDRESS: '{{.OWNER_ADDRESS | default "0x1528b86ff561f617602356efdbD05908a07AA788"}}'
  RUN_ID: '{{.RUN_ID | default "local"}}'
  ALG: '{{.ALG | default "es256"}}'
  PROPOSAL_DIR: "{{.ROOT_DIR}}/.work/univocity-e2e/proposals"

tasks:
  tools:ensure:
    desc: Download deployer + contract-artefacts from univocity-tools GitHub release.
    vars:
      TOOLS_TAG:
        sh: |
          if [ "{{.UNIVOCITY_TOOLS_VERSION}}" = "latest" ]; then
            gh api repos/forestrie/univocity-tools/releases/latest --jq '.tag_name'
          else
            echo "{{.UNIVOCITY_TOOLS_VERSION}}"
          fi
      RELEASE_BASE: https://github.com/forestrie/univocity-tools/releases/download/{{.TOOLS_TAG}}
    cmds:
      - mkdir -p "{{.TOOLS_CACHE_DIR}}"
      - |
        set -euo pipefail
        for app in deployer contract-artefacts; do
          BIN="{{.TOOLS_CACHE_DIR}}/${app}-linux-x64"
          if [ -x "$BIN" ] && [ "${REFRESH_TOOLS:-}" != "1" ]; then
            echo "${app} already present at $BIN"
            continue
          fi
          curl -fsSL "{{.RELEASE_BASE}}/${app}-linux-x64" -o "$BIN"
          curl -fsSL "{{.RELEASE_BASE}}/${app}-linux-x64.sha256" -o "${BIN}.sha256"
          EXPECTED=$(awk '{print $1}' "${BIN}.sha256")
          if command -v sha256sum >/dev/null 2>&1; then
            ACTUAL=$(sha256sum "$BIN" | awk '{print $1}')
          else
            ACTUAL=$(shasum -a 256 "$BIN" | awk '{print $1}')
          fi
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "${app} sha256 mismatch" >&2
            exit 1
          fi
          chmod +x "$BIN"
        done

  fetch-release:
    desc: Fetch latest univocity contract build archive (requires gh auth or GH_TOKEN).
    deps: [tools:ensure]
    cmds:
      - mkdir -p "{{.WORK_DIR}}"
      - |
        set -euo pipefail
        "{{.CART_BIN}}" fetch-release \
          --org forestrie \
          --repo univocity \
          --artefact univocity \
          --auth-kind env \
          --work-dir "{{.WORK_DIR}}" \
          --source-root "{{.ROOT_DIR}}"

  extract:
    desc: Extract fetched build archive into RELEASE_ROOT.
    deps: [fetch-release]
    cmds:
      - |
        set -euo pipefail
        ARCHIVE=$(find "{{.WORK_DIR}}/univocity" -name 'univocity*.tar.gz' | head -1)
        if [ -z "$ARCHIVE" ]; then
          echo "build archive not found under {{.WORK_DIR}}/univocity (run fetch-release)" >&2
          exit 1
        fi
        mkdir -p "{{.RELEASE_ROOT}}"
        "{{.CART_BIN}}" archive-extract "$ARCHIVE" \
          --work-dir "{{.WORK_DIR}}" \
          --source-root "{{.ROOT_DIR}}" \
          --release-root "{{.RELEASE_ROOT}}"

  deploy-one:
    desc: Propose + approve one ImutableUnivocity (ALG, RUN_ID, SALT optional).
    deps: [tools:ensure]
    requires:
      vars: [ALG, RUN_ID]
    vars:
      SALT:
        sh: |
          if [ -n "{{.SALT}}" ]; then
            echo "{{.SALT}}"
          else
            task e2e-univocity:ci-salt RUN_ID="{{.RUN_ID}}" ALG="{{.ALG}}" | tail -1
          fi
    cmds:
      - mkdir -p "{{.PROPOSAL_DIR}}"
      - |
        set -euo pipefail
        RPC="${RPC_URL:-${E2E_UNIVOCITY_RPC_URL:?E2E_UNIVOCITY_RPC_URL or RPC_URL is required}}"
        SALT="{{.SALT}}"
        PROPOSAL="{{.PROPOSAL_DIR}}/proposal-{{.ALG}}-${SALT}.json"
        "{{.DEPLOYER_BIN}}" deploy propose imutable \
          --source-root "{{.ROOT_DIR}}" \
          --release-root "{{.RELEASE_ROOT}}" \
          --bootstrap-alg "{{.ALG}}" \
          --safe-publish \
          --owner-address "{{.OWNER_ADDRESS}}" \
          --deploy-key "${DEPLOY_KEY:?DEPLOY_KEY is required}" \
          --salt "$SALT" \
          --rpc-url "$RPC" \
          ${BOOTSTRAP_PEM_ES256:+--bootstrap-es256-pem "$BOOTSTRAP_PEM_ES256"} \
          --out "$PROPOSAL"
        "{{.DEPLOYER_BIN}}" deploy approve "$PROPOSAL" \
          --source-root "{{.ROOT_DIR}}" \
          --deploy-key "$DEPLOY_KEY" \
          --rpc-url "$RPC"
        CHAIN_ID=$(jq -r '.chainId' "$PROPOSAL")
        ADDR=$(jq -r '.imutableUnivocity' "$PROPOSAL")
        SHORT=$(echo "$ADDR" | tr 'A-Z' 'a-z' | sed 's/^0x//' | cut -c1-8)
        MANIFEST="{{.PROPOSAL_DIR}}/manifest-{{.ALG}}-${CHAIN_ID}-${SHORT}.json"
        jq -n \
          --arg kind "imutable-deployment" \
          --argjson version 1 \
          --arg bootstrapAlg "{{.ALG}}" \
          --argjson chainId "$CHAIN_ID" \
          --arg imutableUnivocity "$ADDR" \
          --arg publishMode "safe" \
          --arg from "$(jq -r '.from' "$PROPOSAL")" \
          --arg salt "$(jq -r '.safe.salt' "$PROPOSAL")" \
          --arg safeTxHash "$(jq -r '.safe.safeTxHash' "$PROPOSAL")" \
          '{
            kind: $kind,
            version: $version,
            bootstrapAlg: $bootstrapAlg,
            chainId: $chainId,
            imutableUnivocity: $imutableUnivocity,
            publishMode: $publishMode,
            from: $from,
            salt: $salt,
            safeTxHash: $safeTxHash
          }' > "$MANIFEST"
        echo "manifest: $MANIFEST"
        cat "$MANIFEST"

  provision:
    desc: |
      Fetch latest univocity release, extract, deploy es256 + ks256 via Safe CREATE2.
      Requires Doppler (DEPLOY_KEY, BOOTSTRAP_PEM_ES256, E2E_UNIVOCITY_RPC_URL).
      Usage: doppler run -- task e2e-univocity:provision RUN_ID=local-smoke
    deps: [extract]
    cmds:
      - task: deploy-one
        vars:
          ALG: es256
          RUN_ID: "{{.RUN_ID}}"
      - task: deploy-one
        vars:
          ALG: ks256
          RUN_ID: "{{.RUN_ID}}"

  env-from-manifest: