# E2e Univocity provisioning (canopy-native fetch + deploy).
# CI: T2 → ci-prepare (ephemeral); T3 → ci-resolve-pins (pinned lane contracts).
# Prerequisite: task install:dev  (or install:release on Linux without checkout)
# Local: doppler run -- task e2e-univocity:provision
version: "3"

vars:
  MANIFEST: "{{.MANIFEST}}"
  TOOLS_CACHE_DIR: "{{.ROOT_DIR}}/.cache/univocity-tools"
  DEPLOYER_BIN: "{{.TOOLS_CACHE_DIR}}/deployer"
  CART_BIN: "{{.TOOLS_CACHE_DIR}}/contract-artefacts"
  WORK_DIR: "{{.ROOT_DIR}}/.work/univocity-e2e"
  RELEASE_ROOT: "{{.ROOT_DIR}}/.work/univocity-release"
  RUN_ID: '{{.RUN_ID | default ""}}'
  ALG: '{{.ALG | default "es256"}}'
  PROPOSAL_DIR: "{{.ROOT_DIR}}/.work/univocity-e2e/proposals"
  ES256_BOOTSTRAP_PEM: "{{.ROOT_DIR}}/.work/e2e-univocity-es256-bootstrap.pem"
  KS256_BOOTSTRAP_KEY: "{{.ROOT_DIR}}/.work/e2e-univocity-ks256-bootstrap.key"
  E2E_UNIVOCITY_ENV_FILE: "{{.ROOT_DIR}}/.work/e2e-univocity.env"

tasks:
  fetch-release:
    desc: Fetch latest univocity contract build archive (requires gh auth or GH_TOKEN).
    preconditions:
      - sh: test -x "{{.DEPLOYER_BIN}}" && test -x "{{.CART_BIN}}"
        msg: "Run task install:dev (or install:release) first — binaries missing under {{.TOOLS_CACHE_DIR}}"
    cmds:
      - mkdir -p "{{.WORK_DIR}}"
      - |
        set -euo pipefail
        "{{.CART_BIN}}" fetch-release \
          --org forestrie \
          --repo univocity \
          --artefact univocity \
          --auth-kind gh-cli \
          --work-dir "{{.WORK_DIR}}" \
          --source-root "{{.ROOT_DIR}}"

  extract:
    desc: Extract fetched build archive into RELEASE_ROOT.
    deps: [fetch-release]
    cmds:
      - |
        set -euo pipefail
        ARCHIVE=$(find "{{.WORK_DIR}}/univocity" -name 'univocity*.tar.gz' | head -1)
        if [ -z "$ARCHIVE" ]; then
          echo "build archive not found under {{.WORK_DIR}}/univocity (run fetch-release)" >&2
          exit 1
        fi
        mkdir -p "{{.RELEASE_ROOT}}"
        "{{.CART_BIN}}" archive-extract "$ARCHIVE" \
          --work-dir "{{.WORK_DIR}}" \
          --source-root "{{.ROOT_DIR}}" \
          --release-root "{{.RELEASE_ROOT}}"

  deploy-one:
    desc: Propose + execute one ImutableUnivocity via EOA deploy (ephemeral bootstrap key).
    preconditions:
      - sh: test -x "{{.DEPLOYER_BIN}}" && test -x "{{.CART_BIN}}"
        msg: "Run task install:dev (or install:release) first — binaries missing under {{.TOOLS_CACHE_DIR}}"
    requires:
      vars: [ALG]
    cmds:
      - mkdir -p "{{.PROPOSAL_DIR}}" "{{.ROOT_DIR}}/.work"
      - |
        set -euo pipefail
        trim_ws() { printf '%s' "$1" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
        resolve_rpc_url() {
          local from_rpc from_e2e
          from_rpc="$(trim_ws "${RPC_URL:-}")"
          from_e2e="$(trim_ws "${E2E_UNIVOCITY_RPC_URL:-}")"
          if [ -n "$from_rpc" ]; then
            printf '%s' "$from_rpc"
          elif [ -n "$from_e2e" ]; then
            printf '%s' "$from_e2e"
          else
            return 1
          fi
        }
        RPC="$(resolve_rpc_url)" || {
          echo "E2E_UNIVOCITY_RPC_URL or RPC_URL is required" >&2
          exit 1
        }
        RUN_ID="${E2E_PROVISION_RUN_ID:-$(date +%s)}"
        export E2E_PROVISION_RUN_ID="$RUN_ID"
        "{{.DEPLOYER_BIN}}" deploy provision e2e \
          --source-root "{{.ROOT_DIR}}" \
          --work-dir "{{.ROOT_DIR}}/.work" \
          --release-root "{{.RELEASE_ROOT}}" \
          --rpc-url "$RPC" \
          --deploy-key "${DEPLOY_KEY:?DEPLOY_KEY is required}" \
          --run-id "$RUN_ID" \
          --alg "{{.ALG}}" \
          --skip-fetch \
          --proposal-dir "{{.PROPOSAL_DIR}}" \
          --bootstrap-es256-pem-out "{{.ES256_BOOTSTRAP_PEM}}" \
          --bootstrap-ks256-key-out "{{.KS256_BOOTSTRAP_KEY}}"
        MANIFEST=$(cat "{{.PROPOSAL_DIR}}/provision-${RUN_ID}-{{.ALG}}.manifest")
        echo "manifest: $MANIFEST"
        cat "$MANIFEST"

  provision:
    desc: |
      Fetch latest univocity release, extract, deploy es256 + ks256 via EOA.
      Prerequisite: task install:dev
      Requires Doppler (DEPLOY_KEY, E2E_UNIVOCITY_RPC_URL).
      Usage: doppler run -- task e2e-univocity:provision
    deps: [extract]
    cmds:
      - mkdir -p "{{.PROPOSAL_DIR}}" "{{.ROOT_DIR}}/.work"
      - |
        set -euo pipefail
        trim_ws() { printf '%s' "$1" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
        resolve_rpc_url() {
          local from_rpc from_e2e
          from_rpc="$(trim_ws "${RPC_URL:-}")"
          from_e2e="$(trim_ws "${E2E_UNIVOCITY_RPC_URL:-}")"
          if [ -n "$from_rpc" ]; then
            printf '%s' "$from_rpc"
          elif [ -n "$from_e2e" ]; then
            printf '%s' "$from_e2e"
          else
            return 1
          fi
        }
        RPC="$(resolve_rpc_url)" || {
          echo "E2E_UNIVOCITY_RPC_URL or RPC_URL is required" >&2
          exit 1
        }
        RUN_ID="${E2E_PROVISION_RUN_ID:-$(date +%s)}"
        export E2E_PROVISION_RUN_ID="$RUN_ID"
        "{{.DEPLOYER_BIN}}" deploy provision e2e \
          --source-root "{{.ROOT_DIR}}" \
          --work-dir "{{.ROOT_DIR}}/.work" \
          --release-root "{{.RELEASE_ROOT}}" \
          --rpc-url "$RPC" \
          --deploy-key "${DEPLOY_KEY:?DEPLOY_KEY is required}" \
          --run-id "$RUN_ID" \
          --skip-fetch \
          --proposal-dir "{{.PROPOSAL_DIR}}" \
          --bootstrap-es256-pem-out "{{.ES256_BOOTSTRAP_PEM}}" \
          --bootstrap-ks256-key-out "{{.KS256_BOOTSTRAP_KEY}}"

  ci-prepare:
    desc: |
      T2 CI — ephemeral Imutable bootstrap provision (tests-system.yml e2e_tier=t2).
      Writes GITHUB_OUTPUT when set. Requires DEPLOY_KEY, E2E_UNIVOCITY_RPC_URL,
      INPUT_* env vars, GH_TOKEN for fetch.
    cmds:
      - bash taskfiles/e2e-univocity-ci-prepare.sh

  ci-resolve-pins:
    desc: |
      T3 CI — resolve pinned Univocity contracts from GitHub Environment (no provision).
      Writes GITHUB_OUTPUT when set. Requires ES256 pin (+ optional KS256 pin / keys).
    cmds:
      - bash taskfiles/e2e-univocity-ci-resolve-pins.sh

  env-from-manifest:
    desc: |
      Print shell exports for E2E_UNIVOCITY_* from an imutable deployment manifest.
      Usage: eval "$(task e2e-univocity:env-from-manifest MANIFEST=path/to/manifest.json)"
    requires:
      vars: [MANIFEST]
    cmds:
      - |
        set -euo pipefail
        if [ ! -f "{{.MANIFEST}}" ]; then
          echo "manifest not found: {{.MANIFEST}}" >&2
          exit 1
        fi
        CHAIN_ID=$(jq -r '.chainId' "{{.MANIFEST}}")
        ADDR=$(jq -r '.imutableUnivocity' "{{.MANIFEST}}")
        ALG=$(jq -r '.bootstrapAlg' "{{.MANIFEST}}")
        LOG_ID=$(task e2e-univocity:genesis-log-id ADDR="$ADDR" | tail -1)
        echo "export E2E_UNIVOCITY_CHAIN_ID=${CHAIN_ID}"
        if [ "$ALG" = "es256" ]; then
          echo "export E2E_UNIVOCITY_ADDRESS_ES256_BOOTSTRAP=${ADDR}"
          echo "export E2E_UNIVOCITY_GENESIS_LOG_ID_ES256=${LOG_ID}"
        elif [ "$ALG" = "ks256" ]; then
          echo "export E2E_UNIVOCITY_ADDRESS_KS256_BOOTSTRAP=${ADDR}"
          echo "export E2E_UNIVOCITY_GENESIS_LOG_ID_KS256=${LOG_ID}"
        else
          echo "unknown bootstrapAlg: $ALG" >&2
          exit 1
        fi
        trim_ws() { printf '%s' "$1" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
        resolve_rpc_url() {
          local from_rpc from_e2e
          from_rpc="$(trim_ws "${RPC_URL:-}")"
          from_e2e="$(trim_ws "${E2E_UNIVOCITY_RPC_URL:-}")"
          if [ -n "$from_rpc" ]; then
            printf '%s' "$from_rpc"
          elif [ -n "$from_e2e" ]; then
            printf '%s' "$from_e2e"
          else
            return 1
          fi
        }
        if RPC_RESOLVED="$(resolve_rpc_url)"; then
          echo "export E2E_UNIVOCITY_RPC_URL=${RPC_RESOLVED}"
        fi

  env-from-manifests:
    desc: |
      Print combined E2E_UNIVOCITY_* exports for es256 + ks256 manifests.
      Auto-discovers newest manifests under PROPOSAL_DIR when paths are omitted.
    vars:
      MANIFEST_ES256:
        sh: |
          if [ -n "{{.MANIFEST_ES256}}" ]; then
            echo "{{.MANIFEST_ES256}}"
          else
            ls -t "{{.PROPOSAL_DIR}}"/manifest-es256-*.json 2>/dev/null | head -1
          fi
      MANIFEST_KS256:
        sh: |
          if [ -n "{{.MANIFEST_KS256}}" ]; then
            echo "{{.MANIFEST_KS256}}"
          else
            ls -t "{{.PROPOSAL_DIR}}"/manifest-ks256-*.json 2>/dev/null | head -1
          fi
    cmds:
      - |
        set -euo pipefail
        ES256="{{.MANIFEST_ES256}}"
        KS256="{{.MANIFEST_KS256}}"
        if [ -z "$ES256" ] || [ -z "$KS256" ]; then
          echo "missing es256 or ks256 manifest (set MANIFEST_ES256/MANIFEST_KS256 or run provision)" >&2
          exit 1
        fi
        task e2e-univocity:env-from-manifest MANIFEST="$ES256"
        task e2e-univocity:env-from-manifest MANIFEST="$KS256" | grep -v '^export E2E_UNIVOCITY_CHAIN_ID='

  write-env-file:
    desc: Write combined E2E_UNIVOCITY exports to .work/e2e-univocity.env for Playwright.
    vars:
      OUT_FILE: "{{.E2E_UNIVOCITY_ENV_FILE}}"
    cmds:
      - mkdir -p "{{.ROOT_DIR}}/.work"
      - |
        set -euo pipefail
        task e2e-univocity:env-from-manifests \
          MANIFEST_ES256="{{.MANIFEST_ES256}}" \
          MANIFEST_KS256="{{.MANIFEST_KS256}}" \
          > "{{.OUT_FILE}}"
        echo "export E2E_UNIVOCITY_ES256_BOOTSTRAP_PEM_FILE={{.ES256_BOOTSTRAP_PEM}}" >> "{{.OUT_FILE}}"
        if [ -f "{{.KS256_BOOTSTRAP_KEY}}" ]; then
          KS256_SIGNER=$(cast wallet address --private-key "$(tr -d '\n' < "{{.KS256_BOOTSTRAP_KEY}}")")
          echo "export E2E_UNIVOCITY_KS256_BOOTSTRAP_SIGNER=${KS256_SIGNER}" >> "{{.OUT_FILE}}"
          echo "export E2E_UNIVOCITY_KS256_BOOTSTRAP_KEY_FILE={{.KS256_BOOTSTRAP_KEY}}" >> "{{.OUT_FILE}}"
        fi
        echo "export E2E_SKIP_UNIVOCITY_CHAIN_BINDING=false" >> "{{.OUT_FILE}}"
        echo "wrote {{.OUT_FILE}}"

  write-skip-env-file:
    desc: Write opt-out marker so Playwright skips Univocity chain-binding specs.
    cmds:
      - mkdir -p "{{.ROOT_DIR}}/.work"
      - |
        set -euo pipefail
        if [ -f "{{.E2E_UNIVOCITY_ENV_FILE}}" ]; then
          echo "Note: {{.E2E_UNIVOCITY_ENV_FILE}} exists; chain-binding may use stale addresses." >&2
          grep -v '^export E2E_SKIP_UNIVOCITY_CHAIN_BINDING=' "{{.E2E_UNIVOCITY_ENV_FILE}}" > "{{.E2E_UNIVOCITY_ENV_FILE}}.tmp" || true
          mv "{{.E2E_UNIVOCITY_ENV_FILE}}.tmp" "{{.E2E_UNIVOCITY_ENV_FILE}}"
        else
          : > "{{.E2E_UNIVOCITY_ENV_FILE}}"
        fi
        echo "export E2E_SKIP_UNIVOCITY_CHAIN_BINDING=true" >> "{{.E2E_UNIVOCITY_ENV_FILE}}"
        echo "wrote skip marker to {{.E2E_UNIVOCITY_ENV_FILE}}"

  genesis-log-id:
    desc: Derive mnemonic forest log UUID from ImutableUnivocity address (matches univocity/scripts/es256_common.py).
    requires:
      vars: [ADDR]
    cmds:
      - |
        set -euo pipefail
        H=$(echo "{{.ADDR}}" | tr 'A-Z' 'a-z' | sed 's/^0x//')
        if [ "${#H}" -ne 40 ]; then
          echo "expected 20-byte address, got {{.ADDR}}" >&2
          exit 1
        fi
        echo "${H:0:8}-${H:8:4}-${H:12:4}-${H:16:4}-${H:20:12}"

  verify:
    desc: |
      eth_call bootstrapConfig() on manifest imutableUnivocity and assert
      on-chain bootstrap alg matches manifest bootstrapAlg (fail before Playwright).
    requires:
      vars: [MANIFEST]
    cmds:
      - |
        set -euo pipefail
        trim_ws() { printf '%s' "$1" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
        resolve_rpc_url() {
          local from_rpc from_e2e
          from_rpc="$(trim_ws "${RPC_URL:-}")"
          from_e2e="$(trim_ws "${E2E_UNIVOCITY_RPC_URL:-}")"
          if [ -n "$from_rpc" ]; then
            printf '%s' "$from_rpc"
          elif [ -n "$from_e2e" ]; then
            printf '%s' "$from_e2e"
          else
            return 1
          fi
        }
        RPC="$(resolve_rpc_url)" || RPC="https://sepolia.base.org"
        ADDR=$(jq -r '.imutableUnivocity' "{{.MANIFEST}}")
        ALG=$(jq -r '.bootstrapAlg' "{{.MANIFEST}}")
        case "$ALG" in
          es256) EXPECTED_ALG=-7 ;;
          ks256) EXPECTED_ALG=-65799 ;;
          *)
            echo "unknown bootstrapAlg in manifest: $ALG" >&2
            exit 1
            ;;
        esac
        CODE=$(cast code "$ADDR" --rpc-url "$RPC")
        if [ -z "$CODE" ] || [ "$CODE" = "0x" ]; then
          echo "no contract code at $ADDR" >&2
          exit 1
        fi
        ON_CHAIN_ALG=$(
          cast call "$ADDR" "bootstrapConfig()(int64,bytes)" --rpc-url "$RPC" \
            | head -1 \
            | awk '{print $1}'
        )
        if [ "$ON_CHAIN_ALG" != "$EXPECTED_ALG" ]; then
          echo "bootstrap alg mismatch at $ADDR: manifest ${ALG} expects ${EXPECTED_ALG}, on-chain ${ON_CHAIN_ALG}" >&2
          exit 1
        fi
        echo "bootstrapConfig OK at $ADDR (${ALG}, alg=${ON_CHAIN_ALG})"

  verify-pair:
    desc: Assert es256 and ks256 manifests reference distinct contract addresses.
    requires:
      vars: [MANIFEST_ES256, MANIFEST_KS256]
    cmds:
      - |
        set -euo pipefail
        ES256=$(jq -r '.imutableUnivocity' "{{.MANIFEST_ES256}}" | tr 'A-Z' 'a-z')
        KS256=$(jq -r '.imutableUnivocity' "{{.MANIFEST_KS256}}" | tr 'A-Z' 'a-z')
        if [ "$ES256" = "$KS256" ]; then
          echo "es256 and ks256 must deploy to different addresses (both ${ES256})" >&2
          exit 1
        fi
        echo "distinct bootstrap addresses: es256=${ES256} ks256=${KS256}"
