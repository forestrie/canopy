name: Smoke Test

on:
  workflow_call:
    inputs:
      environment:
        description: "Target GitHub Environment / Doppler mapping (devâ†’dev, stageâ†’stg, prodâ†’prd)"
        required: true
        type: string
      test_count:
        description: "Number of statements for smoke test"
        required: false
        type: number
        default: 3

  workflow_dispatch:
    inputs:
      environment:
        description: "Target GitHub Environment"
        required: true
        type: choice
        options:
          - dev
          - stage
          - prod
        default: dev
      test_count:
        description: "Number of statements for smoke test"
        required: false
        type: number
        default: 3

jobs:
  smoke-test:
    name: Smoke test (${{ inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run smoke test
        env:
          ENV: ${{ inputs.environment }}
          CANOPY_FQDN: ${{ vars.CANOPY_FQDN }}
          SCRAPI_API_KEY: ${{ secrets.SCRAPI_API_KEY }}
          TEST_SCRAPI_LOG_PATH: ${{ vars.TEST_SCRAPI_LOG_PATH }}
        run: |
          set -euo pipefail
          trim_ws() { printf '%s' "$1" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          for name in CANOPY_FQDN SCRAPI_API_KEY TEST_SCRAPI_LOG_PATH; do
            eval "v=\${$name-}"
            if [ -z "$(trim_ws "$v")" ]; then
              echo "::error::$name is not set in GitHub Environment **${{ inputs.environment }}** (Doppler sync)."
              exit 1
            fi
          done
          echo "Running smoke:${{ inputs.test_count }} against ${{ inputs.environment }}..."
          task scrapi:smoke:${{ inputs.test_count }}

      - name: Report result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "âś… Smoke test passed for ${{ inputs.environment }}"
          else
            echo "âťŚ Smoke test failed for ${{ inputs.environment }}"
          fi
