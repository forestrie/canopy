# Deploys canopy-api to dev, then read-only health checks, then full Playwright e2e.
# For branch protection on `main`, require this workflow (or the final job
# "API e2e (dev, dev)" from the nested API Playwright e2e workflow) to pass.
#
# Fork PRs: only "Validate" runs; deploy/e2e are skipped (no repo secrets).

name: PR dev deploy and e2e

on:
  pull_request:
    branches: [main]

concurrency:
  group: dev-deploy-e2e-${{ github.repository }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate (lint and unit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run check

      - name: Unit tests
        run: pnpm -r test

      - name: Perf lib unit tests
        run: pnpm --filter @canopy/perf test

  changes:
    name: Detect PR changes
    runs-on: ubuntu-latest
    outputs:
      coordinator: ${{ steps.filter.outputs.delegation_coordinator }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            delegation_coordinator:
              - 'packages/apps/delegation-coordinator/**'
              - 'packages/shared/forestrie-sharding/**'
              - 'packages/tests/canopy-api/tests/coordinator/**'
              - 'packages/tests/canopy-api/tests/utils/coordinator-*.ts'

  deploy-dev:
    name: Deploy canopy-api (dev)
    needs: validate
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: dev

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      DEPLOY_ENV: dev
      CANOPY_ID: ${{ vars.CANOPY_ID }}
      FOREST_PROJECT_ID: ${{ vars.FOREST_PROJECT_ID }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CUSTODIAN_URL: ${{ vars.CUSTODIAN_URL }}
      CANOPY_FQDN: ${{ vars.CANOPY_FQDN }}
      R2_MMRS_BUCKET_NAME: ${{ vars.R2_MMRS_BUCKET_NAME }}
      SEQUENCING_QUEUE_SCRIPT_NAME: ${{ vars.SEQUENCING_QUEUE_SCRIPT_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Wrangler
        run: pnpm add -g wrangler@^4.94.0

      - name: Authenticate Wrangler
        run: |
          echo "Authenticating with Cloudflare..."
          yes n | wrangler whoami

      - name: Unit tests (@canopy/api)
        run: pnpm --filter @canopy/api run test

      # Mutable deployment identity is injected from GitHub Environment vars below.
      - name: Configure Custodian secrets and deploy canopy-api (dev)
        working-directory: packages/apps/canopy-api
        env:
          CUSTODIAN_BOOTSTRAP_APP_TOKEN: ${{ secrets.CUSTODIAN_BOOTSTRAP_APP_TOKEN }}
          BOOTSTRAP_APP_TOKEN: ${{ secrets.BOOTSTRAP_APP_TOKEN }}
          CUSTODIAN_APP_TOKEN: ${{ secrets.CUSTODIAN_APP_TOKEN }}
          CURATOR_ADMIN_TOKEN: ${{ secrets.CURATOR_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          trim_ws() { printf '%s' "$1" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          BOOT=$(trim_ws "${CUSTODIAN_BOOTSTRAP_APP_TOKEN:-}")
          if [ -z "$BOOT" ]; then
            BOOT=$(trim_ws "${BOOTSTRAP_APP_TOKEN:-}")
          fi
          if [ -n "$BOOT" ]; then
            printf '%s' "$BOOT" | wrangler secret put CUSTODIAN_BOOTSTRAP_APP_TOKEN --env dev
          else
            echo "CUSTODIAN_BOOTSTRAP_APP_TOKEN not set; skipping (optional for canopy-api)."
          fi
          APP=$(trim_ws "${CUSTODIAN_APP_TOKEN:-}")
          if [ -z "$APP" ]; then
            echo "::error::CUSTODIAN_APP_TOKEN is required for canopy-api (receipt verification)."
            exit 1
          fi
          printf '%s' "$APP" | wrangler secret put CUSTODIAN_APP_TOKEN --env dev
          CURATOR=$(trim_ws "${CURATOR_ADMIN_TOKEN:-}")
          if [ -z "$CURATOR" ]; then
            echo "::error::CURATOR_ADMIN_TOKEN is required for canopy-api (POST /api/forest/.../genesis)."
            exit 1
          fi
          printf '%s' "$CURATOR" | wrangler secret put CURATOR_ADMIN_TOKEN --env dev
          for key in FOREST_PROJECT_ID CUSTODIAN_URL R2_MMRS_BUCKET_NAME SEQUENCING_QUEUE_SCRIPT_NAME CANOPY_FQDN; do
            if [ -z "$(trim_ws "${!key:-}")" ]; then
              echo "::error::${key} is required in GitHub Environment dev."
              exit 1
            fi
          done
          node scripts/apply-runtime-contract.mjs --env dev --out wrangler.runtime.jsonc
          wrangler deploy --config wrangler.runtime.jsonc --env dev

  deploy-coordinator-dev:
    name: Deploy delegation-coordinator (dev)
    needs: [validate, changes]
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      needs.changes.outputs.coordinator == 'true'
    runs-on: ubuntu-latest
    environment: dev

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      DEPLOY_ENV: dev
      CUSTODIAN_URL: ${{ vars.CUSTODIAN_URL }}
      DELEGATION_COORDINATOR_URL: ${{ vars.DELEGATION_COORDINATOR_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Install Wrangler
        run: pnpm add -g wrangler@^4.94.0

      - name: Authenticate Wrangler
        run: yes n | wrangler whoami

      - name: Unit tests (@canopy/delegation-coordinator)
        run: pnpm --filter @canopy/delegation-coordinator run test

      - name: Configure Coordinator secrets and deploy (dev)
        working-directory: packages/apps/delegation-coordinator
        env:
          COORDINATOR_APP_TOKEN: ${{ secrets.COORDINATOR_APP_TOKEN }}
          CUSTODIAN_APP_TOKEN: ${{ secrets.CUSTODIAN_APP_TOKEN }}
        run: |
          set -euo pipefail
          trim_ws() { printf '%s' "$1" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          COORD=$(trim_ws "${COORDINATOR_APP_TOKEN:-}")
          if [ -z "$COORD" ]; then
            echo "::error::COORDINATOR_APP_TOKEN is required for delegation-coordinator."
            exit 1
          fi
          printf '%s' "$COORD" | wrangler secret put COORDINATOR_APP_TOKEN --env dev
          CUST=$(trim_ws "${CUSTODIAN_APP_TOKEN:-}")
          if [ -z "$CUST" ]; then
            echo "::error::CUSTODIAN_APP_TOKEN is required for delegation-coordinator."
            exit 1
          fi
          printf '%s' "$CUST" | wrangler secret put CUSTODIAN_APP_TOKEN --env dev
          if [ -z "$(trim_ws "${CUSTODIAN_URL:-}")" ]; then
            echo "::error::CUSTODIAN_URL is required in GitHub Environment dev."
            exit 1
          fi
          if [ -z "$(trim_ws "${DELEGATION_COORDINATOR_URL:-}")" ]; then
            echo "::error::DELEGATION_COORDINATOR_URL is required in GitHub Environment dev."
            exit 1
          fi
          node scripts/apply-runtime-contract.mjs --env dev --out wrangler.runtime.jsonc
          wrangler deploy --config wrangler.runtime.jsonc --env dev

  health-after-deploy:
    name: Health check (dev)
    needs: [validate, deploy-dev, deploy-coordinator-dev]
    if: |
      always() &&
      needs.deploy-dev.result == 'success' &&
      (needs.deploy-coordinator-dev.result == 'success' || needs.deploy-coordinator-dev.result == 'skipped')
    uses: ./.github/workflows/health-check.yml
    secrets: inherit
    with:
      environment: dev

  provision-univocity:
    name: Provision Univocity (fetch + deploy)
    needs: validate
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      vars.E2E_UNIVOCITY_PROVISION_FRESH == 'true'
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      es256_address: ${{ steps.map.outputs.es256_address }}
      ks256_address: ${{ steps.map.outputs.ks256_address }}
      es256_log_id: ${{ steps.map.outputs.es256_log_id }}
      ks256_log_id: ${{ steps.map.outputs.ks256_log_id }}
    env:
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      BOOTSTRAP_PEM_ES256: ${{ secrets.BOOTSTRAP_PEM_ES256 }}
      RPC_URL: ${{ vars.E2E_UNIVOCITY_RPC_URL }}
      OWNER_ADDRESS: "0x1528b86ff561f617602356efdbD05908a07AA788"
      WORK_DIR: .work
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: tibdex/github-app-token@v1
        with:
          app_id: ${{ vars.GITAPP_ID }}
          private_key: ${{ secrets.GITAPP_PRIVATE_KEY }}

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Download univocity-tools binaries
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          TOOLS_VERSION=$(gh api repos/forestrie/univocity-tools/releases/latest --jq '.tag_name')
          echo "Using univocity-tools ${TOOLS_VERSION}"
          CACHE="${RUNNER_TEMP}/univocity-tools"
          mkdir -p "$CACHE"
          RELEASE_BASE="https://github.com/forestrie/univocity-tools/releases/download/${TOOLS_VERSION}"
          for app in deployer contract-artefacts; do
            BIN="${CACHE}/${app}-linux-x64"
            curl -fsSL "${RELEASE_BASE}/${app}-linux-x64" -o "$BIN"
            curl -fsSL "${RELEASE_BASE}/${app}-linux-x64.sha256" -o "${BIN}.sha256"
            EXPECTED=$(awk '{print $1}' "${BIN}.sha256")
            ACTUAL=$(sha256sum "$BIN" | awk '{print $1}')
            if [ "$EXPECTED" != "$ACTUAL" ]; then
              echo "::error::${app} sha256 mismatch"
              exit 1
            fi
            chmod +x "$BIN"
          done
          echo "${CACHE}" >> "$GITHUB_PATH"
          echo "TOOLS_VERSION=${TOOLS_VERSION}" >> "$GITHUB_ENV"

      - name: Fetch and extract univocity build archive
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          RELEASE_ROOT="${RUNNER_TEMP}/univocity-release"
          mkdir -p "${WORK_DIR}"
          contract-artefacts fetch-release \
            --org forestrie \
            --repo univocity \
            --artefact univocity \
            --auth-kind env \
            --work-dir "${WORK_DIR}" \
            --source-root .
          ARCHIVE=$(find "${WORK_DIR}/univocity" -name 'univocity*.tar.gz' | head -1)
          if [ -z "$ARCHIVE" ]; then
            echo "::error::univocity build archive not found under ${WORK_DIR}/univocity"
            exit 1
          fi
          contract-artefacts archive-extract "$ARCHIVE" \
            --work-dir "${WORK_DIR}" \
            --source-root . \
            --release-root "$RELEASE_ROOT"
          echo "RELEASE_ROOT=$RELEASE_ROOT" >> "$GITHUB_ENV"

      - name: Deploy ImutableUnivocity (es256)
        id: es256
        run: |
          set -euo pipefail
          SALT=$(cast keccak $(cast abi-encode "f(string,uint256,string)" "canopy-e2e" "${{ github.run_id }}" "es256"))
          PROPOSAL="${RUNNER_TEMP}/proposal-es256.json"
          deployer deploy propose imutable \
            --source-root . \
            --release-root "$RELEASE_ROOT" \
            --bootstrap-alg es256 \
            --safe-publish \
            --owner-address "$OWNER_ADDRESS" \
            --deploy-key "$DEPLOY_KEY" \
            --bootstrap-es256-pem "$BOOTSTRAP_PEM_ES256" \
            --salt "$SALT" \
            --rpc-url "$RPC_URL" \
            --out "$PROPOSAL"
          deployer deploy approve "$PROPOSAL" \
            --source-root . \
            --deploy-key "$DEPLOY_KEY" \
            --rpc-url "$RPC_URL"
          echo "address=$(jq -r '.imutableUnivocity' "$PROPOSAL")" >> "$GITHUB_OUTPUT"

      - name: Deploy ImutableUnivocity (ks256)
        id: ks256
        run: |
          set -euo pipefail
          SALT=$(cast keccak $(cast abi-encode "f(string,uint256,string)" "canopy-e2e" "${{ github.run_id }}" "ks256"))
          PROPOSAL="${RUNNER_TEMP}/proposal-ks256.json"
          deployer deploy propose imutable \
            --source-root . \
            --release-root "$RELEASE_ROOT" \
            --bootstrap-alg ks256 \
            --safe-publish \
            --owner-address "$OWNER_ADDRESS" \
            --deploy-key "$DEPLOY_KEY" \
            --salt "$SALT" \
            --rpc-url "$RPC_URL" \
            --out "$PROPOSAL"
          deployer deploy approve "$PROPOSAL" \
            --source-root . \
            --deploy-key "$DEPLOY_KEY" \
            --rpc-url "$RPC_URL"
          echo "address=$(jq -r '.imutableUnivocity' "$PROPOSAL")" >> "$GITHUB_OUTPUT"

      - id: map
        run: |
          set -euo pipefail
          es256='${{ steps.es256.outputs.address }}'
          ks256='${{ steps.ks256.outputs.address }}'
          log_id() {
            local addr="$1"
            local h
            h=$(echo "$addr" | tr 'A-Z' 'a-z' | sed 's/^0x//')
            echo "${h:0:8}-${h:8:4}-${h:12:4}-${h:16:4}-${h:20:12}"
          }
          echo "es256_address=$es256" >> "$GITHUB_OUTPUT"
          echo "ks256_address=$ks256" >> "$GITHUB_OUTPUT"
          echo "es256_log_id=$(log_id "$es256")" >> "$GITHUB_OUTPUT"
          echo "ks256_log_id=$(log_id "$ks256")" >> "$GITHUB_OUTPUT"

  api-e2e-full:
    name: API e2e full (dev)
    needs:
      - validate
      - deploy-dev
      - deploy-coordinator-dev
      - health-after-deploy
      - changes
      - provision-univocity
    if: |
      always() &&
      needs.deploy-dev.result == 'success' &&
      (needs.deploy-coordinator-dev.result == 'success' || needs.deploy-coordinator-dev.result == 'skipped') &&
      needs.health-after-deploy.result == 'success' &&
      (needs.provision-univocity.result == 'success' || needs.provision-univocity.result == 'skipped')
    uses: ./.github/workflows/api-e2e-playwright.yml
    secrets: inherit
    with:
      environment: dev
      playwright_project: system
      require_coordinator_e2e: ${{ needs.changes.outputs.coordinator == 'true' }}
      e2e_univocity_address_es256: ${{ needs.provision-univocity.outputs.es256_address || '' }}
      e2e_univocity_address_ks256: ${{ needs.provision-univocity.outputs.ks256_address || '' }}
      e2e_univocity_genesis_log_id_es256: ${{ needs.provision-univocity.outputs.es256_log_id || '' }}
      e2e_univocity_genesis_log_id_ks256: ${{ needs.provision-univocity.outputs.ks256_log_id || '' }}
