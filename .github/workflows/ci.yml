name: CI

on:
  push:
  pull_request:

jobs:
  check:
    name: Lint, format, and unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build e2e-kit for dogfood consumers
        run: pnpm --filter @forestrie/canopy-e2e-kit build

      - name: Lint and format
        run: pnpm run check

      - name: Unit tests
        run: pnpm -r test

      - name: Perf lib unit tests
        run: pnpm --filter @canopy/perf test
