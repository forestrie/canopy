name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Unit tests
        run: pnpm -r test

  deploy-dev:
    name: Deploy release to dev (Lane A)
    needs: unit-tests
    uses: ./.github/workflows/deploy-workers.yml
    secrets: inherit
    with:
      environment: dev
      run_e2e: false

  system-e2e-dev:
    name: System tests (dev gate)
    needs: deploy-dev
    uses: ./.github/workflows/tests-system.yml
    secrets: inherit
    with:
      environment: dev
      require_coordinator_e2e: true
      playwright_project: system
      ignore_deploy_path_overlap: true

  promote-prod:
    name: Promote to prod (Lane B)
    needs: system-e2e-dev
    uses: ./.github/workflows/deploy-workers.yml
    secrets: inherit
    with:
      environment: prod
      run_e2e: false

  health-check-prod:
    name: Health check (prod)
    needs: promote-prod
    if: always() && needs.promote-prod.result == 'success'
    uses: ./.github/workflows/health-check.yml
    secrets: inherit
    with:
      environment: prod
