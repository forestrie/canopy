name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: prod  # Requires approval

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CANOPY_ID: ${{ vars.CANOPY_ID }}
      FOREST_PROJECT_ID: ${{ vars.FOREST_PROJECT_ID }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Wrangler
        run: pnpm add -g wrangler

      - name: Authenticate Wrangler
        run: |
          echo "Authenticating with Cloudflare..."
          yes n | wrangler whoami

      - name: Run tests
        run: pnpm -r test

      - name: Deploy to Cloudflare (production)
        run: task deploy:prod

  health-check:
    name: Health check (prod)
    needs: deploy-prod
    if: always() && needs.deploy-prod.result == 'success'
    uses: ./.github/workflows/health-check.yml
    secrets: inherit
    with:
      environment: prod

  api-e2e:
    name: API e2e (prod, non-mutating)
    needs: [deploy-prod, health-check]
    if: always() && needs.deploy-prod.result == 'success' && needs.health-check.result == 'success'
    uses: ./.github/workflows/api-e2e-playwright.yml
    secrets: inherit
    with:
      environment: prod
      playwright_project: prod
