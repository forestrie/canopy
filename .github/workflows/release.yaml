name: Release

# Tag push: deploy dev + system gate. Orchestrator dispatch (ADR-0043): same
# path from main with optional skip of cross-repo T3 when qualify-dev is green.
# Lane-b promotion is owned by the orchestrator promotion gate (ARC-0025).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      orchestrator_run_id:
        description: Correlation id from release-orchestrator release.yml
        required: true
        type: string
      skip_cross_repo_tests:
        description: Skip system-tests when orchestrator already qualified dev
        required: false
        default: true
        type: boolean

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Unit tests
        run: pnpm -r test

  deploy-dev:
    name: Deploy release to dev (Lane A)
    needs: unit-tests
    uses: ./.github/workflows/deploy-workers.yml
    secrets: inherit
    with:
      environment: dev
      run_e2e: false

  system-tests:
    name: System tests (dev gate)
    needs: deploy-dev
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.skip_cross_repo_tests != 'true'
    uses: ./.github/workflows/tests-system.yml
    secrets: inherit
    with:
      environment: dev
      require_coordinator_e2e: true
      playwright_project: system
      ignore_deploy_path_overlap: true

  capture-release-fragment:
    name: Capture release fragment
    needs: [deploy-dev, system-tests]
    if: >-
      always() &&
      needs.deploy-dev.result == 'success' &&
      (needs.system-tests.result == 'success' ||
       needs.system-tests.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Resolve release metadata
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          sha="${{ github.sha }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            latest=$(gh release list --repo "${{ github.repository }}" --limit 1 \
              --json tagName -q '.[0].tagName // empty')
            if [ -z "$latest" ]; then
              tag="v0.1.0"
            else
              base="${latest#v}"
              IFS=. read -r major minor patch <<< "${base%%-*}"
              patch=$((patch + 1))
              tag="v${major}.${minor}.${patch}"
            fi
          else
            tag="${{ github.ref_name }}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Write release fragment
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          SHA: ${{ steps.meta.outputs.sha }}
          ORCH_RUN_ID: >-
            ${{ github.event_name == 'workflow_dispatch' &&
            github.event.inputs.orchestrator_run_id || github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p release-metadata
          jq -n \
            --arg repo "${{ github.repository }}" \
            --arg tag "$TAG" \
            --arg sha "$SHA" \
            --arg ref "${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref_name }}" \
            --arg orchestratorRunId "$ORCH_RUN_ID" \
            --arg capturedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              schemaVersion: 3,
              repo: $repo,
              ref: $ref,
              tag: $tag,
              sha: $sha,
              orchestratorRunId: $orchestratorRunId,
              capturedAt: $capturedAt,
              services: {
                canopy: { repo: "forestrie/canopy", ref: $sha }
              }
            }' > release-metadata/release-fragment.jsonc
          cat release-metadata/release-fragment.jsonc

      - name: Upload release fragment
        uses: actions/upload-artifact@v4
        with:
          name: release-fragment
          path: release-metadata/release-fragment.jsonc
          retention-days: 90
          if-no-files-found: error

  publish-github-release:
    name: Publish GitHub Release (orchestrator dispatch)
    needs: capture-release-fragment
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create annotated tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.capture-release-fragment.outputs.release_tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Orchestrator release $TAG"
          git push origin "$TAG"
          KIT_VERSION=$(node -p "require('./packages/tests/e2e-kit/package.json').version")
          jq -n \
            --arg ecosystem "pnpm" \
            --arg pkg "@forestrie/canopy-e2e-kit" \
            --arg ver "$KIT_VERSION" \
            '{ ecosystem: $ecosystem, components: { ($pkg): $ver } }' \
            > components.jsonc
          cat components.jsonc
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Orchestrator-driven release (run ${{ github.event.inputs.orchestrator_run_id }})." \
            components.jsonc
