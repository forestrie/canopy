name: Deploy Workers

on:
  push:
    branches: [main]
    paths:
      - "packages/apps/canopy-api/**"
      - "packages/apps/delegation-signer/**"
      - "packages/apps/forestrie-ingress/**"
      - "packages/apps/x402-settlement/**"
      - "packages/shared/**"
      - "packages/merklelog/**"
      - "Taskfile.dist.yml"
      - "taskfiles/wrangler.yml"
      - ".github/workflows/deploy-workers.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      app:
        description: "Worker to deploy (leave empty for all)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - canopy-api
          - delegation-signer
          - forestrie-ingress
          - x402-settlement

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.apps }}
      environment: ${{ steps.env.outputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect changes
        id: changes
        if: github.event_name == 'push'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            canopy_api:
              - 'packages/apps/canopy-api/**'
              - 'packages/shared/**'
              - 'packages/merklelog/**'
            delegation_signer:
              - 'packages/apps/delegation-signer/**'
              - 'packages/shared/**'
              - 'packages/merklelog/**'
            forestrie_ingress:
              - 'packages/apps/forestrie-ingress/**'
              - 'packages/shared/**'
              - 'packages/merklelog/**'
            x402_settlement:
              - 'packages/apps/x402-settlement/**'
              - 'packages/shared/**'
              - 'packages/merklelog/**'

      - name: Build matrix
        id: matrix
        run: |
          apps=()

          # For workflow_dispatch, use the selected app or all apps
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            selected_app="${{ inputs.app }}"
            if [ -n "$selected_app" ]; then
              # Single app selected
              case "$selected_app" in
                canopy-api)
                  apps+=("{\"app\":\"canopy-api\",\"pkg\":\"@canopy/api\"}")
                  ;;
                delegation-signer)
                  apps+=("{\"app\":\"delegation-signer\",\"pkg\":\"@canopy/delegation-signer\"}")
                  ;;
                forestrie-ingress)
                  apps+=("{\"app\":\"forestrie-ingress\",\"pkg\":\"@canopy/forestrie-ingress\"}")
                  ;;
                x402-settlement)
                  apps+=("{\"app\":\"x402-settlement\",\"pkg\":\"@canopy/x402-settlement\"}")
                  ;;
              esac
            else
              # No app selected - deploy all
              apps+=("{\"app\":\"canopy-api\",\"pkg\":\"@canopy/api\"}")
              apps+=("{\"app\":\"delegation-signer\",\"pkg\":\"@canopy/delegation-signer\"}")
              apps+=("{\"app\":\"forestrie-ingress\",\"pkg\":\"@canopy/forestrie-ingress\"}")
              apps+=("{\"app\":\"x402-settlement\",\"pkg\":\"@canopy/x402-settlement\"}")
            fi
          else
            # For push events, use change detection
            if [ "${{ steps.changes.outputs.canopy_api }}" = "true" ]; then
              apps+=("{\"app\":\"canopy-api\",\"pkg\":\"@canopy/api\"}")
            fi
            if [ "${{ steps.changes.outputs.delegation_signer }}" = "true" ]; then
              apps+=("{\"app\":\"delegation-signer\",\"pkg\":\"@canopy/delegation-signer\"}")
            fi
            if [ "${{ steps.changes.outputs.forestrie_ingress }}" = "true" ]; then
              apps+=("{\"app\":\"forestrie-ingress\",\"pkg\":\"@canopy/forestrie-ingress\"}")
            fi
            if [ "${{ steps.changes.outputs.x402_settlement }}" = "true" ]; then
              apps+=("{\"app\":\"x402-settlement\",\"pkg\":\"@canopy/x402-settlement\"}")
            fi
          fi

          if [ "${#apps[@]}" -eq 0 ]; then
            echo "apps=[]" >> "$GITHUB_OUTPUT"
          else
            json="[$(IFS=,; echo "${apps[*]}")]"
            echo "apps=$json" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy worker (${{ needs.changes.outputs.environment }})
    needs: changes
    if: needs.changes.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    environment: ${{ needs.changes.outputs.environment }}
    concurrency:
      group: worker-deploy-${{ matrix.target.app }}-${{ needs.changes.outputs.environment }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.changes.outputs.matrix) }}

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CDP_API_KEY_ID: ${{ secrets.CDP_API_KEY_ID }}
      CDP_API_KEY_SECRET: ${{ secrets.CDP_API_KEY_SECRET }}
      DEPLOY_ENV: ${{ needs.changes.outputs.environment }}
      CANOPY_ID: ${{ vars.CANOPY_ID }}
      FOREST_PROJECT_ID: ${{ vars.FOREST_PROJECT_ID }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Wrangler
        run: pnpm add -g wrangler

      - name: Authenticate Wrangler
        run: |
          echo "Authenticating with Cloudflare..."
          yes n | wrangler whoami

      - name: Unit tests
        run: pnpm --filter ${{ matrix.target.pkg }} run test

      - name: Configure CDP secrets for canopy-api (prod)
        if: matrix.target.app == 'canopy-api' && env.DEPLOY_ENV == 'prod'
        run: |
          if [ -n "${CDP_API_KEY_ID:-}" ] && [ -n "${CDP_API_KEY_SECRET:-}" ]; then
            echo "Configuring CDP API secrets in Cloudflare (prod env)..."
            printf '%s' "$CDP_API_KEY_ID" | wrangler secret put CDP_API_KEY_ID --env prod --quiet || true
            printf '%s' "$CDP_API_KEY_SECRET" | wrangler secret put CDP_API_KEY_SECRET --env prod --quiet || true
          else
            echo "CDP_API_KEY_ID or CDP_API_KEY_SECRET not set; skipping CDP secret configuration."
          fi

      - name: Configure Custodian secrets and deploy canopy-api (dev)
        if: matrix.target.app == 'canopy-api' && env.DEPLOY_ENV == 'dev'
        working-directory: packages/apps/canopy-api
        env:
          CUSTODIAN_URL: ${{ vars.CUSTODIAN_URL }}
          CUSTODIAN_BOOTSTRAP_APP_TOKEN: ${{ secrets.CUSTODIAN_BOOTSTRAP_APP_TOKEN }}
        run: |
          set -euo pipefail
          trim_ws() { printf '%s' "$1" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          URL=$(trim_ws "${CUSTODIAN_URL:-}")
          if [ -z "$URL" ]; then
            echo "::error::CUSTODIAN_URL must be set in GitHub Environment **dev** (Doppler → vars)."
            exit 1
          fi
          if [ -z "$(trim_ws "${CUSTODIAN_BOOTSTRAP_APP_TOKEN:-}")" ]; then
            echo "::error::CUSTODIAN_BOOTSTRAP_APP_TOKEN must be set in GitHub Environment **dev** secrets."
            exit 1
          fi
          printf '%s' "$URL" | wrangler secret put CUSTODIAN_URL --env dev
          printf '%s' "$CUSTODIAN_BOOTSTRAP_APP_TOKEN" | wrangler secret put CUSTODIAN_BOOTSTRAP_APP_TOKEN --env dev
          wrangler deploy --env dev

      - name: Deploy ${{ matrix.target.app }} (${{ env.DEPLOY_ENV }})
        if: matrix.target.app != 'canopy-api' || env.DEPLOY_ENV != 'dev'
        run: task wrangler:deploy:${{ matrix.target.app }} ENV=${{ env.DEPLOY_ENV }}

  health-check:
    name: Health check (${{ needs.changes.outputs.environment }})
    needs: [changes, deploy]
    if: always() && needs.deploy.result == 'success'
    uses: ./.github/workflows/health-check.yml
    secrets: inherit
    with:
      environment: ${{ needs.changes.outputs.environment }}

  api-e2e:
    name: API e2e (${{ needs.changes.outputs.environment }})
    needs: [changes, deploy, health-check]
    if: always() && needs.deploy.result == 'success' && needs.health-check.result == 'success'
    uses: ./.github/workflows/api-e2e-playwright.yml
    secrets: inherit
    with:
      environment: ${{ needs.changes.outputs.environment }}
      playwright_project: ${{ needs.changes.outputs.environment == 'prod' && 'prod' || 'dev' }}
