name: Deploy Workers

on:
  push:
    branches: [main]
    paths:
      - "packages/apps/canopy-api/**"
      - "packages/apps/delegation-coordinator/**"
      - "packages/apps/forestrie-ingress/**"
      - "packages/apps/x402-settlement/**"
      - "packages/shared/**"
      - "packages/merklelog/**"
      - "Taskfile.dist.yml"
      - "taskfiles/wrangler.yml"
      - "taskfiles/cloudflare.yml"
      - ".github/workflows/deploy-workers.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      ref:
        description: "Git ref to checkout and deploy (commit SHA or tag)"
        required: false
        type: string
        default: ""
      app:
        description: "Worker to deploy (leave empty for all)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - canopy-api
          - delegation-coordinator
          - forestrie-ingress
          - x402-settlement
      run_e2e:
        description: "Run system tests after health check (dev only)"
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: string
      ref:
        description: "Git ref to checkout and deploy (commit SHA or tag)"
        required: false
        type: string
        default: ""
      app:
        description: "Worker to deploy (leave empty for all)"
        required: false
        type: string
        default: ""
      run_e2e:
        description: "Run system tests after health check (dev only)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.apps }}
      environment: ${{ steps.env.outputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - name: Determine environment
        id: env
        run: |
          # workflow_call inherits the caller event_name (e.g. tag push); use inputs.
          if [ -n "${{ inputs.environment }}" ]; then
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect changes
        id: changes
        if: github.event_name == 'push' && inputs.environment == ''
        uses: dorny/paths-filter@v3
        with:
          filters: |
            deploy_workflow:
              - '.github/workflows/deploy-workers.yml'
            wrangler_tasks:
              - 'Taskfile.dist.yml'
              - 'taskfiles/wrangler.yml'
            canopy_api:
              - 'packages/apps/canopy-api/**'
              - 'packages/shared/**'
              - 'packages/merklelog/**'
            forestrie_ingress:
              - 'packages/apps/forestrie-ingress/**'
              - 'packages/shared/**'
              - 'packages/merklelog/**'
            delegation_coordinator:
              - 'packages/apps/delegation-coordinator/**'
              - 'packages/shared/**'
            x402_settlement:
              - 'packages/apps/x402-settlement/**'
              - 'packages/shared/**'
              - 'packages/merklelog/**'

      - name: Build matrix
        id: matrix
        run: |
          apps=()

          # Caller-driven deploy (dispatch or reusable workflow_call with inputs).
          if [ -n "${{ inputs.environment }}" ]; then
            selected_app="${{ inputs.app }}"
            if [ -n "$selected_app" ]; then
              # Single app selected
              case "$selected_app" in
                canopy-api)
                  apps+=("{\"app\":\"canopy-api\",\"pkg\":\"@canopy/api\"}")
                  ;;
                forestrie-ingress)
                  apps+=("{\"app\":\"forestrie-ingress\",\"pkg\":\"@canopy/forestrie-ingress\"}")
                  ;;
                delegation-coordinator)
                  apps+=("{\"app\":\"delegation-coordinator\",\"pkg\":\"@canopy/delegation-coordinator\"}")
                  ;;
                x402-settlement)
                  apps+=("{\"app\":\"x402-settlement\",\"pkg\":\"@canopy/x402-settlement\"}")
                  ;;
              esac
            else
              # No app selected - deploy all
              apps+=("{\"app\":\"canopy-api\",\"pkg\":\"@canopy/api\"}")
              apps+=("{\"app\":\"delegation-coordinator\",\"pkg\":\"@canopy/delegation-coordinator\"}")
              apps+=("{\"app\":\"forestrie-ingress\",\"pkg\":\"@canopy/forestrie-ingress\"}")
              apps+=("{\"app\":\"x402-settlement\",\"pkg\":\"@canopy/x402-settlement\"}")
            fi
          else
            # For push events, use change detection
            if [ "${{ steps.changes.outputs.deploy_workflow }}" = "true" ] || [ "${{ steps.changes.outputs.wrangler_tasks }}" = "true" ]; then
              # Workflow / shared deploy wiring changed: deploy all workers
              apps+=("{\"app\":\"canopy-api\",\"pkg\":\"@canopy/api\"}")
              apps+=("{\"app\":\"delegation-coordinator\",\"pkg\":\"@canopy/delegation-coordinator\"}")
              apps+=("{\"app\":\"forestrie-ingress\",\"pkg\":\"@canopy/forestrie-ingress\"}")
              apps+=("{\"app\":\"x402-settlement\",\"pkg\":\"@canopy/x402-settlement\"}")
            else
              if [ "${{ steps.changes.outputs.canopy_api }}" = "true" ]; then
                apps+=("{\"app\":\"canopy-api\",\"pkg\":\"@canopy/api\"}")
              fi
              if [ "${{ steps.changes.outputs.delegation_coordinator }}" = "true" ]; then
                apps+=("{\"app\":\"delegation-coordinator\",\"pkg\":\"@canopy/delegation-coordinator\"}")
              fi
              if [ "${{ steps.changes.outputs.forestrie_ingress }}" = "true" ]; then
                apps+=("{\"app\":\"forestrie-ingress\",\"pkg\":\"@canopy/forestrie-ingress\"}")
              fi
              if [ "${{ steps.changes.outputs.x402_settlement }}" = "true" ]; then
                apps+=("{\"app\":\"x402-settlement\",\"pkg\":\"@canopy/x402-settlement\"}")
              fi
            fi
          fi

          if [ "${#apps[@]}" -eq 0 ]; then
            echo "apps=[]" >> "$GITHUB_OUTPUT"
          else
            json="[$(IFS=,; echo "${apps[*]}")]"
            echo "apps=$json" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy worker (${{ needs.changes.outputs.environment }})
    needs: changes
    if: needs.changes.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    environment: ${{ needs.changes.outputs.environment }}
    concurrency:
      group: worker-deploy-${{ matrix.target.app }}-${{ needs.changes.outputs.environment }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.changes.outputs.matrix) }}

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CDP_API_KEY_ID: ${{ secrets.CDP_API_KEY_ID }}
      CDP_API_KEY_SECRET: ${{ secrets.CDP_API_KEY_SECRET }}
      DEPLOY_ENV: ${{ needs.changes.outputs.environment }}
      CANOPY_ID: ${{ vars.CANOPY_ID }}
      FOREST_PROJECT_ID: ${{ vars.FOREST_PROJECT_ID }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CUSTODIAN_URL: ${{ vars.CUSTODIAN_URL }}
      CANOPY_FQDN: ${{ vars.CANOPY_FQDN }}
      CANOPY_FQDN_ALIASES: ${{ vars.CANOPY_FQDN_ALIASES }}
      DELEGATION_COORDINATOR_URL: ${{ vars.DELEGATION_COORDINATOR_URL }}
      DELEGATION_COORDINATOR_URL_ALIASES: ${{ vars.DELEGATION_COORDINATOR_URL_ALIASES }}
      # Optional: univocity owned grant store + authority resolver. When set, the
      # worker delegates creation-grant validation and genesis storage to it.
      UNIVOCITY_SERVICE_URL: ${{ vars.UNIVOCITY_SERVICE_URL }}
      SUPPORTED_CHAINS_RPC: ${{ vars.SUPPORTED_CHAINS_RPC }}
      R2_MMRS_BUCKET_NAME: ${{ vars.R2_MMRS_BUCKET_NAME }}
      R2_GRANTS_BUCKET_NAME: ${{ vars.R2_GRANTS_BUCKET_NAME }}
      SEQUENCING_QUEUE_SCRIPT_NAME: ${{ vars.SEQUENCING_QUEUE_SCRIPT_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Wrangler
        run: pnpm add -g wrangler@^4.94.0

      - name: Authenticate Wrangler
        run: |
          echo "Authenticating with Cloudflare..."
          yes n | wrangler whoami

      - name: Unit tests
        run: pnpm --filter ${{ matrix.target.pkg }} run test

      - name: Configure CDP secrets for canopy-api (prod)
        if: matrix.target.app == 'canopy-api' && env.DEPLOY_ENV == 'prod'
        run: |
          if [ -n "${CDP_API_KEY_ID:-}" ] && [ -n "${CDP_API_KEY_SECRET:-}" ]; then
            echo "Configuring CDP API secrets in Cloudflare (prod env)..."
            printf '%s' "$CDP_API_KEY_ID" | wrangler secret put CDP_API_KEY_ID --env prod --quiet || true
            printf '%s' "$CDP_API_KEY_SECRET" | wrangler secret put CDP_API_KEY_SECRET --env prod --quiet || true
          else
            echo "CDP_API_KEY_ID or CDP_API_KEY_SECRET not set; skipping CDP secret configuration."
          fi

      - name: Configure Custodian secrets and deploy canopy-api
        if: matrix.target.app == 'canopy-api'
        working-directory: packages/apps/canopy-api
        env:
          CUSTODIAN_APP_TOKEN: ${{ secrets.CUSTODIAN_APP_TOKEN }}
          CANOPY_OPS_ADMIN_TOKEN: ${{ secrets.CANOPY_OPS_ADMIN_TOKEN }}
          COORDINATOR_APP_TOKEN: ${{ secrets.COORDINATOR_APP_TOKEN }}
          UNIVOCITY_API_TOKEN: ${{ secrets.UNIVOCITY_API_TOKEN }}
        run: |
          set -euo pipefail
          trim_ws() { printf '%s' "$1" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          put_wrangler_secret() {
            local name="$1" value="$2"
            printf '%s' "$value" | wrangler secret put "$name" --env "$ENV"
          }
          ENV="${DEPLOY_ENV}"
          APP=$(trim_ws "${CUSTODIAN_APP_TOKEN:-}")
          if [ -z "$APP" ]; then
            echo "::error::CUSTODIAN_APP_TOKEN is required for canopy-api (receipt verification)."
            exit 1
          fi
          put_wrangler_secret CUSTODIAN_APP_TOKEN "$APP"
          COORD=$(trim_ws "${COORDINATOR_APP_TOKEN:-}")
          if [ -z "$COORD" ]; then
            echo "::error::COORDINATOR_APP_TOKEN is required for canopy-api BYOK receipt verification."
            exit 1
          fi
          put_wrangler_secret COORDINATOR_APP_TOKEN "$COORD"
          OPS=$(trim_ws "${CANOPY_OPS_ADMIN_TOKEN:-}")
          if [ -z "$OPS" ]; then
            echo "::error::CANOPY_OPS_ADMIN_TOKEN is required for canopy-api (onboard-token mint / payments ops)."
            exit 1
          fi
          put_wrangler_secret CANOPY_OPS_ADMIN_TOKEN "$OPS"
          UNIV=$(trim_ws "${UNIVOCITY_API_TOKEN:-}")
          if [ -z "$UNIV" ]; then
            echo "::error::UNIVOCITY_API_TOKEN is required for canopy-api (creation-grant validation)."
            exit 1
          fi
          put_wrangler_secret UNIVOCITY_API_TOKEN "$UNIV"
          for key in CANOPY_ID FOREST_PROJECT_ID CUSTODIAN_URL DELEGATION_COORDINATOR_URL R2_MMRS_BUCKET_NAME R2_GRANTS_BUCKET_NAME SEQUENCING_QUEUE_SCRIPT_NAME CANOPY_FQDN UNIVOCITY_SERVICE_URL; do
            if [ -z "$(trim_ws "${!key:-}")" ]; then
              echo "::error::${key} is required in GitHub Environment ${ENV}."
              exit 1
            fi
          done
          if [ "${ENV}" = "prod" ]; then
            for key in CANOPY_FQDN_ALIASES DELEGATION_COORDINATOR_URL_ALIASES; do
              if [ -z "$(trim_ws "${!key:-}")" ]; then
                echo "::error::${key} is required in GitHub Environment prod (Lane B production aliases)."
                exit 1
              fi
            done
          fi
          node scripts/apply-runtime-contract.mjs --env "$ENV" --out wrangler.runtime.jsonc
          DOMAIN_FLAGS="$(
            cd "${GITHUB_WORKSPACE}"
            PRIMARY="${CANOPY_FQDN}" ALIASES="${CANOPY_FQDN_ALIASES:-}" task wrangler:domain-flags
          )"
          # shellcheck disable=SC2086
          wrangler deploy --config wrangler.runtime.jsonc --env "$ENV" ${DOMAIN_FLAGS}

      - name: Configure Coordinator secrets and deploy delegation-coordinator
        if: matrix.target.app == 'delegation-coordinator'
        working-directory: packages/apps/delegation-coordinator
        env:
          COORDINATOR_APP_TOKEN: ${{ secrets.COORDINATOR_APP_TOKEN }}
          CUSTODIAN_APP_TOKEN: ${{ secrets.CUSTODIAN_APP_TOKEN }}
          COORDINATOR_RESET_TOKEN: ${{ secrets.COORDINATOR_RESET_TOKEN }}
          WEBHOOK_SIGNING_KEY_PEM: ${{ secrets.WEBHOOK_SIGNING_KEY_PEM }}
          WALLET_CHALLENGE_SIGNING_SECRET: ${{ secrets.WALLET_CHALLENGE_SIGNING_SECRET }}
        run: |
          set -euo pipefail
          trim_ws() { printf '%s' "$1" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          put_wrangler_secret() {
            local name="$1" value="$2"
            printf '%s' "$value" | wrangler secret put "$name" --env "$ENV"
          }
          ENV="${DEPLOY_ENV}"
          COORD=$(trim_ws "${COORDINATOR_APP_TOKEN:-}")
          if [ -z "$COORD" ]; then
            echo "::error::COORDINATOR_APP_TOKEN is required for delegation-coordinator."
            exit 1
          fi
          put_wrangler_secret COORDINATOR_APP_TOKEN "$COORD"
          CUST=$(trim_ws "${CUSTODIAN_APP_TOKEN:-}")
          if [ -z "$CUST" ]; then
            echo "::error::CUSTODIAN_APP_TOKEN is required for delegation-coordinator (custody-keys API)."
            exit 1
          fi
          put_wrangler_secret CUSTODIAN_APP_TOKEN "$CUST"
          WALLET=$(trim_ws "${WALLET_CHALLENGE_SIGNING_SECRET:-}")
          if [ -z "$WALLET" ]; then
            echo "::error::WALLET_CHALLENGE_SIGNING_SECRET is required for delegation-coordinator (wallet-challenge sessions)."
            exit 1
          fi
          put_wrangler_secret WALLET_CHALLENGE_SIGNING_SECRET "$WALLET"
          RESET=$(trim_ws "${COORDINATOR_RESET_TOKEN:-}")
          if [ "${ENV}" = "dev" ] && [ -n "$RESET" ]; then
            put_wrangler_secret COORDINATOR_RESET_TOKEN "$RESET"
            echo "Configured COORDINATOR_RESET_TOKEN (dev lane content-reset)."
          elif [ "${ENV}" = "dev" ]; then
            echo "COORDINATOR_RESET_TOKEN not set; skipping (content-reset coordinator wipe unavailable)."
          fi
          PEM=$(trim_ws "${WEBHOOK_SIGNING_KEY_PEM:-}")
          if [ -z "$PEM" ]; then
            echo "::error::WEBHOOK_SIGNING_KEY_PEM is required (bootstrap via task cf:coordinator:bootstrap-webhook-signing-key, sync to GitHub Environment secret)."
            exit 1
          fi
          cd "${GITHUB_WORKSPACE}"
          task cf:coordinator:ensure-webhook-signing-key
          cd packages/apps/delegation-coordinator
          for key in CUSTODIAN_URL DELEGATION_COORDINATOR_URL; do
            if [ -z "$(trim_ws "${!key:-}")" ]; then
              echo "::error::${key} is required in GitHub Environment ${ENV}."
              exit 1
            fi
          done
          if [ "${ENV}" = "prod" ]; then
            if [ -z "$(trim_ws "${DELEGATION_COORDINATOR_URL_ALIASES:-}")" ]; then
              echo "::error::DELEGATION_COORDINATOR_URL_ALIASES is required in GitHub Environment prod."
              exit 1
            fi
          fi
          node scripts/apply-runtime-contract.mjs --env "$ENV" --out wrangler.runtime.jsonc
          DOMAIN_FLAGS="$(
            cd "${GITHUB_WORKSPACE}"
            PRIMARY="${DELEGATION_COORDINATOR_URL}" ALIASES="${DELEGATION_COORDINATOR_URL_ALIASES:-}" task wrangler:domain-flags
          )"
          # shellcheck disable=SC2086
          wrangler deploy --config wrangler.runtime.jsonc --env "$ENV" ${DOMAIN_FLAGS}

      - name: Deploy ${{ matrix.target.app }} (${{ env.DEPLOY_ENV }})
        if: matrix.target.app != 'canopy-api' && matrix.target.app != 'delegation-coordinator'
        run: task wrangler:deploy:${{ matrix.target.app }} ENV=${{ env.DEPLOY_ENV }}

  health-check:
    name: Health check (${{ needs.changes.outputs.environment }})
    needs: [changes, deploy]
    if: always() && needs.deploy.result == 'success'
    uses: ./.github/workflows/health-check.yml
    secrets: inherit
    with:
      environment: ${{ needs.changes.outputs.environment }}

  system-tests:
    name: System tests (${{ needs.changes.outputs.environment }})
    needs: [changes, deploy, health-check]
    if: |
      always() &&
      needs.deploy.result == 'success' &&
      needs.health-check.result == 'success' &&
      needs.changes.outputs.environment == 'dev' &&
      (
        (github.event_name == 'push' && inputs.environment == '') ||
        inputs.run_e2e == true
      )
    uses: ./.github/workflows/tests-system.yml
    secrets: inherit
    with:
      environment: dev
      require_coordinator_e2e: true
      playwright_project: system
      ignore_deploy_path_overlap: true
