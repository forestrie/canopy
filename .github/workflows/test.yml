name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    # Doppler → GitHub sync: use the **dev** environment (maps to Doppler `dev`).
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run check

      - name: Unit tests
        run: pnpm -r test

      - name: Perf lib unit tests
        run: pnpm --filter @canopy/perf test

      # Playwright resolves CANOPY_BASE_URL from vars or https://CANOPY_FQDN (see packages/tests/canopy-api/playwright.config.ts).
      # Optional: set E2E_REQUIRE_BOOTSTRAP=1 here once the dev worker is Custodian-backed (Plan 0014) to fail if bootstrap mint is 503.
      - name: API e2e tests (deployed)
        env:
          CANOPY_FQDN: ${{ vars.CANOPY_FQDN }}
          SCRAPI_API_KEY: ${{ secrets.SCRAPI_API_KEY }}
          CANOPY_BASE_URL: ${{ vars.CANOPY_BASE_URL }}
        run: |
          set -euo pipefail
          trim_ws() { printf '%s' "$1" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          if [ -z "$(trim_ws "${SCRAPI_API_KEY:-}")" ]; then
            echo "::error::SCRAPI_API_KEY is not set in GitHub Environment **dev** (synced from Doppler)."
            exit 1
          fi
          BASE="$(trim_ws "${CANOPY_BASE_URL:-}")"
          if [ -n "$BASE" ]; then
            export CANOPY_BASE_URL="${BASE%/}"
          else
            FQ=$(trim_ws "${CANOPY_FQDN:-}")
            FQ="${FQ#https://}"
            FQ="${FQ#http://}"
            FQ="${FQ%%/*}"
            FQ="${FQ%/}"
            if [ -z "$FQ" ]; then
              echo "::error::Set **CANOPY_BASE_URL** or **CANOPY_FQDN** in GitHub Environment **dev** (Doppler-synced variables)."
              exit 1
            fi
            export CANOPY_BASE_URL="https://${FQ}"
            export CANOPY_BASE_URL="${CANOPY_BASE_URL%/}"
          fi
          pnpm --filter @canopy/api-e2e exec playwright install chromium
          pnpm --filter @canopy/api-e2e exec playwright test --project=dev
