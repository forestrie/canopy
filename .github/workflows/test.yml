name: Tests

# Pull requests: see **PR dev deploy and e2e** (`pr-dev-deploy-e2e.yml`) for
# deploy + health + full e2e gating. This workflow runs on **main** only.

on:
  push:
    branches: [main]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run check

      - name: Unit tests
        run: pnpm -r test

      - name: Perf lib unit tests
        run: pnpm --filter @canopy/perf test

  api-e2e:
    name: API e2e (deployed dev)
    needs: test
    uses: ./.github/workflows/api-e2e-playwright.yml
    secrets: inherit
    with:
      environment: dev
      playwright_project: dev
