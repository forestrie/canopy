name: Publish delegation-cose

on:
  workflow_dispatch:
  push:
    tags:
      - "delegation-cose-v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish @forestrie/delegation-cose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://npm.pkg.github.com
          scope: "@forestrie"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Test delegation-cose
        run: pnpm --filter @forestrie/delegation-cose test

      - name: Build delegation-cose
        run: pnpm --filter @forestrie/delegation-cose build

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --filter @forestrie/delegation-cose publish --no-git-checks
