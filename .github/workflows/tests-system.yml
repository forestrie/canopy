name: System tests

permissions:
  contents: read

# Canopy component e2e (T2 bootstrap or T3 system Playwright).
#
# - **T2** (`e2e_tier=t2`): ephemeral Imutable provision — bootstrap path only.
# - **T3** (`e2e_tier=t3`, default): pinned lane contracts; no re-provision.
#   Cross-repo lane specs live in forestrie/system-testing (T3), not here.
#
# Triggers: manual dispatch, workflow_call (deploy-workers, release), and
# push to main when deploy-workers did not run (non-overlapping paths).

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "GitHub Environment for vars and secrets"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod
      require_coordinator_e2e:
        description: "Fail if coordinator env vars missing and run coordinator project"
        required: false
        default: true
        type: boolean
      playwright_project:
        description: "prod = non-mutating prod project; system = full dev suite"
        required: false
        default: system
        type: choice
        options:
          - system
          - prod
      e2e_tier:
        description: "t2 = ephemeral bootstrap provision; t3 = pinned contracts (default)"
        required: false
        default: t3
        type: choice
        options:
          - t3
          - t2
      es256_address:
        description: "Optional ImutableUnivocity address (skip es256 provision)"
        required: false
        type: string
      ks256_address:
        description: "Optional ImutableUnivocity address (skip ks256 provision)"
        required: false
        type: string
      es256_bootstrap_pem_b64:
        description: "Base64 ES256 bootstrap PEM (required when es256_address set)"
        required: false
        type: string
      ks256_bootstrap_key_b64:
        description: "Base64 KS256 bootstrap private key (required when ks256_address set)"
        required: false
        type: string
      es256_genesis_log_id:
        description: "Optional ES256 genesis log id (derived from address when omitted)"
        required: false
        type: string
      ks256_genesis_log_id:
        description: "Optional KS256 genesis log id (derived from address when omitted)"
        required: false
        type: string

  workflow_call:
    inputs:
      ignore_deploy_path_overlap:
        description: |
          Run full suite when caller already deployed (reusable workflows inherit
          parent push events, so path dedupe must be bypassed).
        required: false
        type: boolean
        default: false
      environment:
        description: "GitHub Environment for vars and secrets"
        required: true
        type: string
      require_coordinator_e2e:
        description: "Fail if coordinator env vars missing and run coordinator project"
        required: false
        type: boolean
        default: false
      playwright_project:
        description: "prod = non-mutating prod project; system = full dev suite"
        required: false
        type: string
        default: system
      e2e_tier:
        description: "t2 = ephemeral bootstrap; t3 = pinned contracts (default)"
        required: false
        type: string
        default: t3
      es256_address:
        required: false
        type: string
        default: ""
      ks256_address:
        required: false
        type: string
        default: ""
      es256_bootstrap_pem_b64:
        required: false
        type: string
        default: ""
      ks256_bootstrap_key_b64:
        required: false
        type: string
        default: ""
      es256_genesis_log_id:
        required: false
        type: string
        default: ""
      ks256_genesis_log_id:
        required: false
        type: string
        default: ""

  push:
    branches: [main]

jobs:
  paths:
    name: Path filter (deploy-workers overlap)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      deploy_workers: ${{ steps.filter.outputs.deploy_workers }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect deploy-workers-triggered paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            deploy_workers:
              - "packages/apps/canopy-api/**"
              - "packages/apps/delegation-coordinator/**"
              - "packages/apps/forestrie-ingress/**"
              - "packages/apps/x402-settlement/**"
              - "packages/shared/**"
              - "packages/merklelog/**"
              - "Taskfile.dist.yml"
              - "taskfiles/wrangler.yml"
              - ".github/workflows/deploy-workers.yml"

  t2-bootstrap-univocity:
    name: T2 bootstrap Univocity (ephemeral)
    needs: [paths]
    if: |
      always() &&
      inputs.e2e_tier == 't2' &&
      (
        github.event_name == 'workflow_dispatch' ||
        inputs.ignore_deploy_path_overlap == true ||
        (
          github.event_name == 'push' &&
          needs.paths.result == 'success' &&
          needs.paths.outputs.deploy_workers != 'true'
        )
      )
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'dev' || inputs.environment }}
    outputs:
      es256_address: ${{ steps.prepare.outputs.es256_address }}
      ks256_address: ${{ steps.prepare.outputs.ks256_address }}
      es256_log_id: ${{ steps.prepare.outputs.es256_log_id }}
      ks256_log_id: ${{ steps.prepare.outputs.ks256_log_id }}
      es256_bootstrap_pem_b64: ${{ steps.prepare.outputs.es256_bootstrap_pem_b64 }}
      ks256_bootstrap_signer: ${{ steps.prepare.outputs.ks256_bootstrap_signer }}
      ks256_bootstrap_key_b64: ${{ steps.prepare.outputs.ks256_bootstrap_key_b64 }}
      es256_fresh: ${{ steps.prepare.outputs.es256_fresh }}
      ks256_fresh: ${{ steps.prepare.outputs.ks256_fresh }}
    env:
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      E2E_UNIVOCITY_RPC_URL: ${{ vars.E2E_UNIVOCITY_RPC_URL }}
      INPUT_ES256_ADDRESS: ${{ inputs.es256_address || '' }}
      INPUT_KS256_ADDRESS: ${{ inputs.ks256_address || '' }}
      INPUT_ES256_PEM_B64: ${{ inputs.es256_bootstrap_pem_b64 || '' }}
      INPUT_KS256_KEY_B64: ${{ inputs.ks256_bootstrap_key_b64 || '' }}
      INPUT_ES256_LOG_ID: ${{ inputs.es256_genesis_log_id || '' }}
      INPUT_KS256_LOG_ID: ${{ inputs.ks256_genesis_log_id || '' }}
      PLAYWRIGHT_PROJECT: ${{ github.event_name == 'push' && 'system' || inputs.playwright_project || 'system' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Mint GitHub App token
        id: app-token
        if: ${{ vars.GITAPP_ID != '' }}
        uses: tibdex/github-app-token@v1
        with:
          app_id: ${{ vars.GITAPP_ID }}
          private_key: ${{ secrets.GITAPP_PRIVATE_KEY }}

      - name: T2 ephemeral bootstrap provision
        id: prepare
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
        run: task e2e-univocity:ci-prepare

  t3-resolve-univocity:
    name: T3 resolve Univocity pins (no provision)
    needs: [paths]
    if: |
      always() &&
      inputs.e2e_tier != 't2' &&
      (
        github.event_name == 'workflow_dispatch' ||
        inputs.ignore_deploy_path_overlap == true ||
        (
          github.event_name == 'push' &&
          needs.paths.result == 'success' &&
          needs.paths.outputs.deploy_workers != 'true'
        )
      )
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'dev' || inputs.environment }}
    outputs:
      es256_address: ${{ steps.resolve.outputs.es256_address }}
      ks256_address: ${{ steps.resolve.outputs.ks256_address }}
      es256_log_id: ${{ steps.resolve.outputs.es256_log_id }}
      ks256_log_id: ${{ steps.resolve.outputs.ks256_log_id }}
      es256_bootstrap_pem_b64: ${{ steps.resolve.outputs.es256_bootstrap_pem_b64 }}
      ks256_bootstrap_signer: ${{ steps.resolve.outputs.ks256_bootstrap_signer }}
      ks256_bootstrap_key_b64: ${{ steps.resolve.outputs.ks256_bootstrap_key_b64 }}
      es256_fresh: ${{ steps.resolve.outputs.es256_fresh }}
      ks256_fresh: ${{ steps.resolve.outputs.ks256_fresh }}
    env:
      E2E_UNIVOCITY_RPC_URL: ${{ vars.E2E_UNIVOCITY_RPC_URL }}
      UNIVOCITY_CONTRACT_ADDRESS: ${{ vars.UNIVOCITY_CONTRACT_ADDRESS }}
      E2E_UNIVOCITY_ADDRESS_ES256_BOOTSTRAP: ${{ vars.E2E_UNIVOCITY_ADDRESS_ES256_BOOTSTRAP }}
      E2E_UNIVOCITY_ADDRESS_KS256_BOOTSTRAP: ${{ vars.E2E_UNIVOCITY_ADDRESS_KS256_BOOTSTRAP }}
      INPUT_ES256_ADDRESS: ${{ inputs.es256_address || '' }}
      INPUT_KS256_ADDRESS: ${{ inputs.ks256_address || '' }}
      INPUT_ES256_PEM_B64: ${{ inputs.es256_bootstrap_pem_b64 || secrets.E2E_UNIVOCITY_ES256_BOOTSTRAP_PEM_B64 || '' }}
      INPUT_KS256_KEY_B64: ${{ inputs.ks256_bootstrap_key_b64 || secrets.E2E_UNIVOCITY_KS256_BOOTSTRAP_KEY_B64 || '' }}
      INPUT_ES256_LOG_ID: ${{ inputs.es256_genesis_log_id || '' }}
      INPUT_KS256_LOG_ID: ${{ inputs.ks256_genesis_log_id || '' }}
      PLAYWRIGHT_PROJECT: ${{ github.event_name == 'push' && 'system' || inputs.playwright_project || 'system' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: foundry-rs/foundry-toolchain@v1

      - name: T3 resolve pinned Univocity contracts
        id: resolve
        run: task e2e-univocity:ci-resolve-pins

  system-tests:
    name: System tests (${{ github.event_name == 'push' && 'dev' || inputs.environment }})
    needs: [t2-bootstrap-univocity, t3-resolve-univocity]
    if: |
      always() &&
      (
        needs.t2-bootstrap-univocity.result == 'success' ||
        needs.t3-resolve-univocity.result == 'success'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment: ${{ github.event_name == 'push' && 'dev' || inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build e2e kit
        run: pnpm --filter @forestrie/canopy-e2e-kit build

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: System API tests (Playwright)
        env:
          CANOPY_FQDN: ${{ vars.CANOPY_FQDN }}
          SCRAPI_API_KEY: ${{ secrets.SCRAPI_API_KEY }}
          CANOPY_BASE_URL: ${{ vars.CANOPY_BASE_URL }}
          FOREST_PROJECT_ID: ${{ vars.FOREST_PROJECT_ID }}
          CUSTODIAN_URL: ${{ vars.CUSTODIAN_URL }}
          CUSTODIAN_APP_TOKEN: ${{ secrets.CUSTODIAN_APP_TOKEN }}
          CUSTODIAN_BOOTSTRAP_APP_TOKEN: ${{ secrets.CUSTODIAN_BOOTSTRAP_APP_TOKEN }}
          CANOPY_OPS_ADMIN_TOKEN: ${{ secrets.CANOPY_OPS_ADMIN_TOKEN }}
          DELEGATION_COORDINATOR_URL: ${{ vars.DELEGATION_COORDINATOR_URL }}
          COORDINATOR_APP_TOKEN: ${{ secrets.COORDINATOR_APP_TOKEN }}
          UNIVOCITY_SERVICE_URL: ${{ vars.UNIVOCITY_SERVICE_URL }}
          E2E_UNIVOCITY_ADDRESS_KS256_BOOTSTRAP: ${{ needs.t3-resolve-univocity.outputs.ks256_address || needs.t2-bootstrap-univocity.outputs.ks256_address }}
          E2E_UNIVOCITY_ADDRESS_ES256_BOOTSTRAP: ${{ needs.t3-resolve-univocity.outputs.es256_address || needs.t2-bootstrap-univocity.outputs.es256_address }}
          E2E_UNIVOCITY_RPC_URL: ${{ vars.E2E_UNIVOCITY_RPC_URL }}
          E2E_UNIVOCITY_CHAIN_ID: ${{ vars.E2E_UNIVOCITY_CHAIN_ID }}
          E2E_UNIVOCITY_GENESIS_LOG_ID_KS256: ${{ needs.t3-resolve-univocity.outputs.ks256_log_id || needs.t2-bootstrap-univocity.outputs.ks256_log_id }}
          E2E_UNIVOCITY_GENESIS_LOG_ID_ES256: ${{ needs.t3-resolve-univocity.outputs.es256_log_id || needs.t2-bootstrap-univocity.outputs.es256_log_id }}
          E2E_UNIVOCITY_ES256_BOOTSTRAP_PEM_B64: ${{ needs.t3-resolve-univocity.outputs.es256_bootstrap_pem_b64 || needs.t2-bootstrap-univocity.outputs.es256_bootstrap_pem_b64 }}
          E2E_UNIVOCITY_KS256_BOOTSTRAP_SIGNER: ${{ needs.t3-resolve-univocity.outputs.ks256_bootstrap_signer || needs.t2-bootstrap-univocity.outputs.ks256_bootstrap_signer }}
          E2E_UNIVOCITY_KS256_BOOTSTRAP_KEY_B64: ${{ needs.t3-resolve-univocity.outputs.ks256_bootstrap_key_b64 || needs.t2-bootstrap-univocity.outputs.ks256_bootstrap_key_b64 }}
          E2E_UNIVOCITY_ES256_ALLOW_BOOTSTRAP: ${{ needs.t2-bootstrap-univocity.outputs.es256_fresh || needs.t3-resolve-univocity.outputs.es256_fresh }}
          E2E_UNIVOCITY_KS256_ALLOW_BOOTSTRAP: ${{ needs.t2-bootstrap-univocity.outputs.ks256_fresh || needs.t3-resolve-univocity.outputs.ks256_fresh }}
          E2E_TESTING_TIER: ${{ inputs.e2e_tier || 't3' }}
          PLAYWRIGHT_PROJECT: ${{ github.event_name == 'push' && 'system' || inputs.playwright_project || 'system' }}
          REQUIRE_COORDINATOR_E2E: ${{ github.event_name == 'push' && 'false' || inputs.require_coordinator_e2e || 'false' }}
        run: |
          set -euo pipefail
          trim_ws() { printf '%s' "$1" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          if [ -z "$(trim_ws "${SCRAPI_API_KEY:-}")" ]; then
            echo "::error::SCRAPI_API_KEY is not set in GitHub Environment **${{ inputs.environment || 'dev' }}**."
            exit 1
          fi
          BASE="$(trim_ws "${CANOPY_BASE_URL:-}")"
          if [ -n "$BASE" ]; then
            export CANOPY_BASE_URL="${BASE%/}"
          else
            FQ=$(trim_ws "${CANOPY_FQDN:-}")
            FQ="${FQ#https://}"
            FQ="${FQ#http://}"
            FQ="${FQ%%/*}"
            FQ="${FQ%/}"
            if [ -z "$FQ" ]; then
              echo "::error::Set **CANOPY_BASE_URL** or **CANOPY_FQDN** in GitHub Environment **${{ inputs.environment || 'dev' }}**."
              exit 1
            fi
            export CANOPY_BASE_URL="https://${FQ}"
            export CANOPY_BASE_URL="${CANOPY_BASE_URL%/}"
          fi
          PEM_B64="$(trim_ws "${E2E_UNIVOCITY_ES256_BOOTSTRAP_PEM_B64:-}")"
          if [ -n "$PEM_B64" ]; then
            PEM_FILE="${RUNNER_TEMP}/e2e-es256-bootstrap.pem"
            echo "$PEM_B64" | base64 -d > "$PEM_FILE"
            export E2E_UNIVOCITY_ES256_BOOTSTRAP_PEM_FILE="$PEM_FILE"
          fi
          KS256_SIGNER="$(trim_ws "${E2E_UNIVOCITY_KS256_BOOTSTRAP_SIGNER:-}")"
          if [ -n "$KS256_SIGNER" ]; then
            export E2E_UNIVOCITY_KS256_BOOTSTRAP_SIGNER="$KS256_SIGNER"
          fi
          KS256_KEY_B64="$(trim_ws "${E2E_UNIVOCITY_KS256_BOOTSTRAP_KEY_B64:-}")"
          if [ -n "$KS256_KEY_B64" ]; then
            KS256_KEY_FILE="${RUNNER_TEMP}/e2e-ks256-bootstrap.key"
            echo "$KS256_KEY_B64" | base64 -d > "$KS256_KEY_FILE"
            export E2E_UNIVOCITY_KS256_BOOTSTRAP_KEY_FILE="$KS256_KEY_FILE"
          fi
          export E2E_SKIP_UNIVOCITY_CHAIN_BINDING=false
          if [ "${PLAYWRIGHT_PROJECT}" = "prod" ]; then
            pnpm --filter @canopy/api-e2e exec playwright install chromium
            pnpm --filter @canopy/api-e2e exec playwright test \
              --project=prod \
              --forbid-only
          else
            OPS="$(trim_ws "${CANOPY_OPS_ADMIN_TOKEN:-}")"
            if [ -z "$OPS" ]; then
              echo "::error::CANOPY_OPS_ADMIN_TOKEN is required for bootstrap system e2e (onboard-token genesis)."
              exit 1
            fi
            COORD_URL="$(trim_ws "${DELEGATION_COORDINATOR_URL:-}")"
            COORD_TOKEN="$(trim_ws "${COORDINATOR_APP_TOKEN:-}")"
            task e2e-shared:validate-univocity-deploy
            pnpm --filter @canopy/api-e2e exec playwright install chromium
            pnpm --filter @canopy/api-e2e exec playwright test \
              --project=integration \
              --forbid-only
            pnpm --filter @canopy/api-e2e exec playwright test \
              --project=system \
              --forbid-only
            pnpm --filter @canopy/api-e2e exec playwright test \
              --project=custodian \
              --forbid-only
            if [ -n "$COORD_URL" ] && [ -n "$COORD_TOKEN" ]; then
              pnpm --filter @canopy/api-e2e exec playwright test \
                --project=coordinator \
                --forbid-only
            elif [ "${REQUIRE_COORDINATOR_E2E}" = "true" ]; then
              echo "::error::Coordinator e2e required but DELEGATION_COORDINATOR_URL or COORDINATOR_APP_TOKEN is unset."
              exit 1
            else
              echo "::warning::Skipping coordinator Playwright project."
            fi
          fi

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.event_name == 'push' && 'dev' || inputs.environment }}-${{ github.run_id }}
          path: packages/tests/canopy-api/playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ github.event_name == 'push' && 'dev' || inputs.environment }}-${{ github.run_id }}
          path: packages/tests/canopy-api/test-results/
          retention-days: 14
          if-no-files-found: ignore
