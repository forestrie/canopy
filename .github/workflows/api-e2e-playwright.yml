name: API Playwright e2e

on:
  workflow_call:
    inputs:
      environment:
        description: "GitHub Environment for vars and secrets"
        required: true
        type: string
      playwright_project:
        description: "Playwright mode (system = integration then system then custodian; prod = prod project)"
        required: true
        type: string
      require_coordinator_e2e:
        description: "Fail if coordinator env vars missing and run coordinator Playwright project (dev deploys)"
        required: false
        type: boolean
        default: false
      e2e_univocity_address_es256:
        description: "E2E_UNIVOCITY_ADDRESS_ES256_BOOTSTRAP from ephemeral provision"
        required: false
        type: string
        default: ""
      e2e_univocity_address_ks256:
        description: "E2E_UNIVOCITY_ADDRESS_KS256_BOOTSTRAP from ephemeral provision"
        required: false
        type: string
        default: ""
      e2e_univocity_genesis_log_id_es256:
        description: "E2E_UNIVOCITY_GENESIS_LOG_ID_ES256 from ephemeral provision"
        required: false
        type: string
        default: ""
      e2e_univocity_genesis_log_id_ks256:
        description: "E2E_UNIVOCITY_GENESIS_LOG_ID_KS256 from ephemeral provision"
        required: false
        type: string
        default: ""
      e2e_univocity_es256_bootstrap_pem_b64:
        description: "Base64 ES256 bootstrap PEM from ephemeral provision"
        required: false
        type: string
        default: ""
      e2e_univocity_ks256_bootstrap_signer:
        description: "KS256 bootstrap signer address from ephemeral provision"
        required: false
        type: string
        default: ""

jobs:
  api-e2e:
    name: API e2e (${{ inputs.environment }}, ${{ inputs.playwright_project }})
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Full API e2e (Playwright)
        env:
          CANOPY_FQDN: ${{ vars.CANOPY_FQDN }}
          SCRAPI_API_KEY: ${{ secrets.SCRAPI_API_KEY }}
          CANOPY_BASE_URL: ${{ vars.CANOPY_BASE_URL }}
          FOREST_PROJECT_ID: ${{ vars.FOREST_PROJECT_ID }}
          CUSTODIAN_URL: ${{ vars.CUSTODIAN_URL }}
          CUSTODIAN_APP_TOKEN: ${{ secrets.CUSTODIAN_APP_TOKEN }}
          CUSTODIAN_BOOTSTRAP_APP_TOKEN: ${{ secrets.CUSTODIAN_BOOTSTRAP_APP_TOKEN }}
          CURATOR_ADMIN_TOKEN: ${{ secrets.CURATOR_ADMIN_TOKEN }}
          DELEGATION_COORDINATOR_URL: ${{ vars.DELEGATION_COORDINATOR_URL }}
          COORDINATOR_APP_TOKEN: ${{ secrets.COORDINATOR_APP_TOKEN }}
          E2E_UNIVOCITY_ADDRESS_KS256_BOOTSTRAP: ${{ inputs.e2e_univocity_address_ks256 }}
          E2E_UNIVOCITY_ADDRESS_ES256_BOOTSTRAP: ${{ inputs.e2e_univocity_address_es256 }}
          E2E_UNIVOCITY_RPC_URL: ${{ vars.E2E_UNIVOCITY_RPC_URL }}
          E2E_UNIVOCITY_CHAIN_ID: ${{ vars.E2E_UNIVOCITY_CHAIN_ID }}
          E2E_UNIVOCITY_GENESIS_LOG_ID_KS256: ${{ inputs.e2e_univocity_genesis_log_id_ks256 }}
          E2E_UNIVOCITY_GENESIS_LOG_ID_ES256: ${{ inputs.e2e_univocity_genesis_log_id_es256 }}
          E2E_UNIVOCITY_ES256_BOOTSTRAP_PEM_B64: ${{ inputs.e2e_univocity_es256_bootstrap_pem_b64 }}
          E2E_UNIVOCITY_KS256_BOOTSTRAP_SIGNER: ${{ inputs.e2e_univocity_ks256_bootstrap_signer }}
        run: |
          set -euo pipefail
          trim_ws() { printf '%s' "$1" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          if [ -z "$(trim_ws "${SCRAPI_API_KEY:-}")" ]; then
            echo "::error::SCRAPI_API_KEY is not set in GitHub Environment **${{ inputs.environment }}** (Doppler sync)."
            exit 1
          fi
          BASE="$(trim_ws "${CANOPY_BASE_URL:-}")"
          if [ -n "$BASE" ]; then
            export CANOPY_BASE_URL="${BASE%/}"
          else
            FQ=$(trim_ws "${CANOPY_FQDN:-}")
            FQ="${FQ#https://}"
            FQ="${FQ#http://}"
            FQ="${FQ%%/*}"
            FQ="${FQ%/}"
            if [ -z "$FQ" ]; then
              echo "::error::Set **CANOPY_BASE_URL** or **CANOPY_FQDN** in GitHub Environment **${{ inputs.environment }}**."
              exit 1
            fi
            export CANOPY_BASE_URL="https://${FQ}"
            export CANOPY_BASE_URL="${CANOPY_BASE_URL%/}"
          fi
          PEM_B64="$(trim_ws "${E2E_UNIVOCITY_ES256_BOOTSTRAP_PEM_B64:-}")"
          if [ -n "$PEM_B64" ]; then
            PEM_FILE="${RUNNER_TEMP}/e2e-es256-bootstrap.pem"
            echo "$PEM_B64" | base64 -d > "$PEM_FILE"
            export E2E_UNIVOCITY_ES256_BOOTSTRAP_PEM_FILE="$PEM_FILE"
          fi
          KS256_SIGNER="$(trim_ws "${E2E_UNIVOCITY_KS256_BOOTSTRAP_SIGNER:-}")"
          if [ -n "$KS256_SIGNER" ]; then
            export E2E_UNIVOCITY_KS256_BOOTSTRAP_SIGNER="$KS256_SIGNER"
          fi
          pnpm --filter @canopy/api-e2e exec playwright install chromium
          if [ "${{ inputs.playwright_project }}" = "prod" ]; then
            pnpm --filter @canopy/api-e2e exec playwright test \
              --project=prod \
              --forbid-only
          else
            pnpm --filter @canopy/api-e2e exec playwright test \
              --project=integration \
              --forbid-only
            pnpm --filter @canopy/api-e2e exec playwright test \
              --project=system \
              --forbid-only
            pnpm --filter @canopy/api-e2e exec playwright test \
              --project=custodian \
              --forbid-only
            COORD_URL="$(trim_ws "${DELEGATION_COORDINATOR_URL:-}")"
            COORD_TOKEN="$(trim_ws "${COORDINATOR_APP_TOKEN:-}")"
            if [ -n "$COORD_URL" ] && [ -n "$COORD_TOKEN" ]; then
              pnpm --filter @canopy/api-e2e exec playwright test \
                --project=coordinator \
                --forbid-only
            elif [ "${{ inputs.require_coordinator_e2e }}" = "true" ]; then
              echo "::error::Coordinator e2e required but DELEGATION_COORDINATOR_URL or COORDINATOR_APP_TOKEN is unset in GitHub Environment **${{ inputs.environment }}**."
              exit 1
            else
              echo "::warning::Skipping coordinator Playwright project (DELEGATION_COORDINATOR_URL or COORDINATOR_APP_TOKEN unset)."
            fi
          fi

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ inputs.environment }}-${{ github.run_id }}
          path: packages/tests/canopy-api/playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ inputs.environment }}-${{ github.run_id }}
          path: packages/tests/canopy-api/test-results/
          retention-days: 14
          if-no-files-found: ignore
