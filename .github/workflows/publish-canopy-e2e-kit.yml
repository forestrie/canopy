name: Publish canopy-e2e-kit

on:
  workflow_dispatch:
  push:
    tags:
      - 'canopy-e2e-kit-v*'
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish @forestrie/canopy-e2e-kit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://npm.pkg.github.com
          scope: '@forestrie'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Sync package version from git tag
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          TAG="${GIT_TAG}"
          if [[ "$TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          elif [[ "$TAG" =~ ^canopy-e2e-kit-v(.+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            echo "::error::Unsupported publish tag: ${TAG}" >&2
            exit 1
          fi
          export VERSION
          node -e "
            const fs = require('fs');
            const p = 'packages/tests/e2e-kit/package.json';
            const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Publishing @forestrie/canopy-e2e-kit@${VERSION}"

      - name: Test kit
        run: pnpm --filter @forestrie/canopy-e2e-kit test

      - name: Build kit
        run: pnpm --filter @forestrie/canopy-e2e-kit build

      - name: Verify packed dependency graph
        run: |
          set -euo pipefail
          mkdir -p /tmp/e2e-kit-pack
          pnpm --filter @forestrie/canopy-e2e-kit exec pnpm pack --pack-destination /tmp/e2e-kit-pack
          TARBALL=$(ls -1 /tmp/e2e-kit-pack/forestrie-canopy-e2e-kit-*.tgz | head -1)
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('packages/tests/e2e-kit/package.json','utf8'));
            const dep = pkg.dependencies['@forestrie/delegation-cose'];
            if (!dep || dep === 'workspace:*') {
              throw new Error('delegation-cose must be workspace:^ or semver for publish, got ' + dep);
            }
          "
          echo "pack ok: ${TARBALL}"

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --filter @forestrie/canopy-e2e-kit publish --no-git-checks
