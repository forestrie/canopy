name: Health check

on:
  workflow_call:
    inputs:
      environment:
        description: "GitHub Environment (dev / stage / prod) for vars and secrets"
        required: true
        type: string

  workflow_dispatch:
    inputs:
      environment:
        description: "Target GitHub Environment"
        required: true
        type: choice
        options:
          - dev
          - stage
          - prod
        default: dev

jobs:
  health:
    name: Health check (${{ inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Read-only API health (Playwright)
        env:
          CANOPY_FQDN: ${{ vars.CANOPY_FQDN }}
          CANOPY_FQDN_ALIASES: ${{ vars.CANOPY_FQDN_ALIASES }}
          CANOPY_BASE_URL: ${{ vars.CANOPY_BASE_URL }}
          DELEGATION_COORDINATOR_URL: ${{ vars.DELEGATION_COORDINATOR_URL }}
          DELEGATION_COORDINATOR_URL_ALIASES: ${{ vars.DELEGATION_COORDINATOR_URL_ALIASES }}
        run: |
          set -euo pipefail
          trim_ws() { printf '%s' "$1" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          BASE="$(trim_ws "${CANOPY_BASE_URL:-}")"
          if [ -n "$BASE" ]; then
            export CANOPY_BASE_URL="${BASE%/}"
          else
            FQ=$(trim_ws "${CANOPY_FQDN:-}")
            FQ="${FQ#https://}"
            FQ="${FQ#http://}"
            FQ="${FQ%%/*}"
            FQ="${FQ%/}"
            if [ -z "$FQ" ]; then
              echo "::error::Set **CANOPY_BASE_URL** or **CANOPY_FQDN** in GitHub Environment **${{ inputs.environment }}**."
              exit 1
            fi
            export CANOPY_BASE_URL="https://${FQ}"
            export CANOPY_BASE_URL="${CANOPY_BASE_URL%/}"
          fi
          API_RETRIES="${API_HEALTH_RETRIES:-24}"
          API_SLEEP="${API_HEALTH_SLEEP_SEC:-10}"
          echo "Waiting for ${CANOPY_BASE_URL}/api/health (up to ${API_RETRIES} attempts)..."
          for attempt in $(seq 1 "${API_RETRIES}"); do
            if curl -sf "${CANOPY_BASE_URL}/api/health" >/dev/null; then
              echo "OK: API health ready (attempt ${attempt}/${API_RETRIES})"
              break
            fi
            if [ "${attempt}" -eq "${API_RETRIES}" ]; then
              echo "::error::API health check failed: ${CANOPY_BASE_URL}/api/health after ${API_RETRIES} attempts"
              exit 1
            fi
            echo "API not ready yet (${attempt}/${API_RETRIES}); waiting ${API_SLEEP}s for Custom Domain DNS/SSL..."
            sleep "${API_SLEEP}"
          done
          pnpm --filter @canopy/api-e2e exec playwright install chromium
          pnpm --filter @canopy/api-e2e exec playwright test --project=integration
          COORD_URL="$(trim_ws "${DELEGATION_COORDINATOR_URL:-}")"
          if [ -n "$COORD_URL" ]; then
            COORD_HEALTH="${COORD_URL%/}/_delegation-coordinator/health"
            COORD_RETRIES="${COORD_HEALTH_RETRIES:-18}"
            COORD_SLEEP="${COORD_HEALTH_SLEEP_SEC:-10}"
            echo "Checking ${COORD_HEALTH} (up to ${COORD_RETRIES} attempts, ${COORD_SLEEP}s apart)..."
            BODY=""
            for attempt in $(seq 1 "${COORD_RETRIES}"); do
              BODY="$(curl -sf "${COORD_HEALTH}" || true)"
              if [ -n "${BODY}" ] && printf '%s' "${BODY}" | grep -q '"status"[[:space:]]*:[[:space:]]*"ok"'; then
                echo "OK: coordinator health status=ok (attempt ${attempt}/${COORD_RETRIES})"
                break
              fi
              if [ "${attempt}" -eq "${COORD_RETRIES}" ]; then
                echo "::error::Coordinator health check failed: no ok response from ${COORD_HEALTH} after ${COORD_RETRIES} attempts"
                exit 1
              fi
              echo "Coordinator not ready yet (${attempt}/${COORD_RETRIES}); waiting ${COORD_SLEEP}s for Custom Domain DNS..."
              sleep "${COORD_SLEEP}"
            done
            SIGNING_KEY_URL="${COORD_URL%/}/.well-known/forestrie-webhook-jwks.json"
            SIGNING_RETRIES="${COORD_SIGNING_KEY_RETRIES:-12}"
            SIGNING_SLEEP="${COORD_SIGNING_KEY_SLEEP_SEC:-10}"
            echo "Checking ${SIGNING_KEY_URL} (up to ${SIGNING_RETRIES} attempts)..."
            for attempt in $(seq 1 "${SIGNING_RETRIES}"); do
              if curl -sf "${SIGNING_KEY_URL}" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          keys = d.get('keys') or []
          assert keys, 'no keys in JWKS'
          k = keys[0]
          assert k.get('alg') == 'ES256', k.get('alg')
          assert k.get('use') == 'sig', k.get('use')
          assert k.get('kty') == 'EC' and k.get('crv') == 'P-256'
          "; then
                echo "OK: coordinator webhook JWKS (ES256 P-256) attempt ${attempt}/${SIGNING_RETRIES}"
                break
              fi
              if [ "${attempt}" -eq "${SIGNING_RETRIES}" ]; then
                echo "::error::Coordinator webhook signing key check failed: ${SIGNING_KEY_URL}"
                exit 1
              fi
              echo "Signing key endpoint not ready (${attempt}/${SIGNING_RETRIES}); waiting ${SIGNING_SLEEP}s..."
              sleep "${SIGNING_SLEEP}"
            done
          fi
          if [ "${{ inputs.environment }}" = "prod" ]; then
            for alias_fqdn in $(printf '%s' "${CANOPY_FQDN_ALIASES:-}" | tr ',' ' '); do
              alias_fqdn="$(trim_ws "${alias_fqdn}")"
              [ -z "${alias_fqdn}" ] && continue
              alias_url="https://${alias_fqdn}/api/health"
              ALIAS_RETRIES="${API_HEALTH_RETRIES:-24}"
              ALIAS_SLEEP="${API_HEALTH_SLEEP_SEC:-10}"
              alias_ok=0
              for attempt in $(seq 1 "${ALIAS_RETRIES}"); do
                if curl -sf "${alias_url}" >/dev/null; then
                  echo "OK: prod API alias ${alias_url} (attempt ${attempt}/${ALIAS_RETRIES})"
                  alias_ok=1
                  break
                fi
                if [ "${attempt}" -lt "${ALIAS_RETRIES}" ]; then
                  echo "Prod API alias not ready (${attempt}/${ALIAS_RETRIES}); waiting ${ALIAS_SLEEP}s..."
                  sleep "${ALIAS_SLEEP}"
                fi
              done
              if [ "${alias_ok}" -ne 1 ]; then
                echo "::error::Prod API alias health failed: ${alias_url}"
                exit 1
              fi
            done
            for alias_coord in $(printf '%s' "${DELEGATION_COORDINATOR_URL_ALIASES:-}" | tr ',' ' '); do
              alias_coord="$(trim_ws "${alias_coord}")"
              [ -z "${alias_coord}" ] && continue
              alias_coord_health="${alias_coord%/}/_delegation-coordinator/health"
              if curl -sf "${alias_coord_health}" | grep -q '"status"[[:space:]]*:[[:space:]]*"ok"'; then
                echo "OK: prod coordinator alias ${alias_coord_health}"
              else
                echo "::error::Prod coordinator alias health failed: ${alias_coord_health}"
                exit 1
              fi
            done
          fi
