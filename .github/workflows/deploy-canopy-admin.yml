name: Deploy Canopy Admin

on:
  push:
    branches: [main]
    paths:
      - "packages/apps/canopy-admin/**"
      - ".github/workflows/deploy-canopy-admin.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy canopy-admin to Pages (dev)
    runs-on: ubuntu-latest
    environment: dev
    concurrency:
      group: canopy-admin-pages-dev
      cancel-in-progress: true
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler@^4.94.0

      - name: Authenticate Wrangler
        run: |
          echo "Authenticating with Cloudflare..."
          yes n | wrangler whoami

      - name: Ensure Pages project exists
        run: |
          if wrangler pages project list 2>/dev/null | grep -q "canopy-admin-dev"; then
            echo "Pages project canopy-admin-dev already exists"
          else
            echo "Creating Pages project canopy-admin-dev..."
            wrangler pages project create canopy-admin-dev --production-branch=main
          fi

      - name: Deploy to Cloudflare Pages
        working-directory: packages/apps/canopy-admin
        run: |
          wrangler pages deploy . \
            --project-name=canopy-admin-dev \
            --commit-dirty=true

      - name: Smoke check Pages deployment
        run: |
          PROD_URL="https://canopy-admin-dev.pages.dev"
          for i in 1 2 3 4 5; do
            if curl -sfI "$PROD_URL/" | head -1 | grep -q "200"; then
              curl -sf "$PROD_URL/" | grep -q "Canopy onboard admin"
              echo "Smoke check passed: $PROD_URL"
              exit 0
            fi
            echo "Waiting for $PROD_URL (attempt $i)..."
            sleep 3
          done
          echo "Smoke check failed: $PROD_URL not ready" >&2
          exit 1
