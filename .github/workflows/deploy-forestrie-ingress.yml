name: Deploy Forestrie Ingress

on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "Bootstrap project id requesting the per-project ingress deploy"
        required: false
        default: ""
      dns_sub:
        description: "DNS_SUB from forest project infra (catalog hostnames)"
        required: true
      dns_apex:
        description: "DNS_APEX from forest project infra"
        required: true
      ledger_slot:
        description: "Ledger slot (a or b) for per-slot ingress Worker and route"
        required: true
        default: "a"
        type: choice
        options:
          - a
          - b
      github_environment:
        description: "GitHub Environment that provides Cloudflare deploy secrets"
        required: true
        default: "bootstrap-ingress"
        type: choice
        options:
          - bootstrap-ingress
          - dev
          - prod

run-name: Deploy forestrie-ingress${{ inputs.dns_sub && format(' ({0})', inputs.dns_sub) || '' }} slot ${{ inputs.ledger_slot }}${{ inputs.project_id && format(' for {0}', inputs.project_id) || '' }}

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy forestrie-ingress (${{ inputs.ledger_slot }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.github_environment }}
    concurrency:
      group: forestrie-ingress-${{ inputs.dns_sub || 'shared' }}-${{ inputs.ledger_slot }}
      cancel-in-progress: false
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CANOPY_ID: ${{ vars.CANOPY_ID }}
      FOREST_PROJECT_ID: ${{ vars.FOREST_PROJECT_ID }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CANOPY_FQDN: ${{ vars.CANOPY_FQDN }}
      SEQUENCING_QUEUE_SCRIPT_NAME: ${{ vars.SEQUENCING_QUEUE_SCRIPT_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Wrangler
        run: pnpm add -g wrangler@^4.94.0

      - name: Authenticate Wrangler
        run: |
          echo "Authenticating with Cloudflare..."
          yes n | wrangler whoami

      - name: Unit tests
        run: pnpm --filter @canopy/forestrie-ingress run test

      - name: Typecheck
        run: pnpm --filter @canopy/forestrie-ingress run typecheck

      - name: Resolve deploy contract
        id: contract
        env:
          INPUT_DNS_SUB: ${{ inputs.dns_sub }}
          INPUT_DNS_APEX: ${{ inputs.dns_apex }}
          INPUT_LEDGER_SLOT: ${{ inputs.ledger_slot }}
        run: |
          set -euo pipefail
          trim_ws() { printf '%s' "$1" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//'; }
          DNS_SUB="$(trim_ws "${INPUT_DNS_SUB:-}")"
          DNS_APEX="$(trim_ws "${INPUT_DNS_APEX:-}")"
          SLOT="$(trim_ws "${INPUT_LEDGER_SLOT:-a}")"
          case "${SLOT}" in
            a|b) ;;
            *) echo "::error::ledger_slot must be a or b (got ${SLOT})."; exit 1 ;;
          esac
          if [ -z "${DNS_SUB}" ] || [ -z "${DNS_APEX}" ]; then
            echo "::error::dns_sub and dns_apex workflow inputs are required."
            exit 1
          fi
          INGRESS_FQDN="ingress.${SLOT}.${DNS_SUB}.${DNS_APEX}"
          SCRIPT="forestrie-ingress-${DNS_SUB}-${SLOT}"
          echo "ingress_fqdn=${INGRESS_FQDN}" >> "$GITHUB_OUTPUT"
          echo "script_name=${SCRIPT}" >> "$GITHUB_OUTPUT"
          echo "Deploy ${SCRIPT} with custom domain ${INGRESS_FQDN}"

      - name: Decommission legacy ingress zone routes (slot a only)
        if: inputs.ledger_slot == 'a'
        env:
          DNS_SUB: ${{ inputs.dns_sub }}
          DNS_APEX: ${{ inputs.dns_apex }}
        run: |
          set -euo pipefail
          ZONE_ID="$(curl -sf -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/zones?name=${DNS_APEX}" \
            | jq -r '.result[0].id // empty')"
          if [ -z "${ZONE_ID}" ]; then
            echo "::error::Could not resolve Cloudflare zone id for ${DNS_APEX}."
            exit 1
          fi
          ROUTES_JSON="$(curl -sf -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/workers/routes")"
          LEGACY_PATTERNS=(
            "api-${DNS_SUB}.${DNS_APEX}/canopy/ingress-queue/*"
            "*.${DNS_APEX}/canopy/ingress-queue/*"
          )
          for PATTERN in "${LEGACY_PATTERNS[@]}"; do
            ROUTE_ID="$(printf '%s' "${ROUTES_JSON}" | jq -r --arg p "${PATTERN}" \
              '.result[] | select(.pattern == $p) | .id' | head -1)"
            if [ -z "${ROUTE_ID}" ] || [ "${ROUTE_ID}" = "null" ]; then
              echo "No zone route for ${PATTERN}; continuing."
              continue
            fi
            echo "Deleting legacy zone route ${ROUTE_ID} (${PATTERN})..."
            curl -sf -X DELETE -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/workers/routes/${ROUTE_ID}"
          done
          LEGACY_SCRIPT="forestrie-ingress-${DNS_SUB}"
          echo "Deleting legacy Worker script ${LEGACY_SCRIPT} (best-effort)..."
          curl -sf -X DELETE -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/${LEGACY_SCRIPT}" \
            || echo "Legacy script ${LEGACY_SCRIPT} not present or already deleted."

      - name: Deploy per-slot forestrie-ingress
        working-directory: packages/apps/forestrie-ingress
        env:
          INGRESS_FQDN: ${{ steps.contract.outputs.ingress_fqdn }}
          SEQUENCING_QUEUE_SCRIPT_NAME: ${{ steps.contract.outputs.script_name }}
        run: |
          set -euo pipefail
          node scripts/apply-runtime-contract.mjs --env prod --out wrangler.runtime.jsonc
          DOMAIN_FLAGS="$(
            cd "${GITHUB_WORKSPACE}"
            PRIMARY="${INGRESS_FQDN}" task wrangler:domain-flags
          )"
          # shellcheck disable=SC2086
          wrangler deploy --config wrangler.runtime.jsonc --env prod ${DOMAIN_FLAGS}
